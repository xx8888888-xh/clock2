name: React Native APK Build

on:
  push:
    branches: [react-native-rewrite]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Delete stale package-lock.json
        working-directory: ./react-native-simple
        run: rm -f package-lock.json

      - name: Install npm dependencies
        working-directory: ./react-native-simple
        run: npm install

      - name: Run Metro bundle directly (capture error for debugging)
        working-directory: ./react-native-simple
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle             --platform android             --dev false             --entry-file index.js             --bundle-output android/app/src/main/assets/index.android.bundle             --assets-dest android/app/src/main/res             2>&1 || echo "Bundle step failed (exit code $?)"

      - name: Build release APK
        working-directory: ./react-native-simple/android
        env:
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: ./gradlew assembleRelease --no-daemon -x lint || echo "Gradle failed (exit code $?)"

      - name: Find APK file
        id: find-apk
        run: |
          APK_PATH=$(find react-native-simple/android -name "*.apk" -path "*/release/*" 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find react-native-simple/android -name "*.apk" 2>/dev/null | head -1)
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Upload APK artifact
        if: steps.find-apk.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: react-native-clock2-apk
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30

      - name: APK Size Verification
        if: steps.find-apk.outputs.apk_path != ''
        run: |
          SIZE=$(du -h "${{ steps.find-apk.outputs.apk_path }}" | cut -f1)
          echo "APK Size: $SIZE"
