name: React Native APK Build

on:
  push:
    branches: [react-native-rewrite]
  pull_request:
    branches: [react-native-rewrite]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: react-native-simple/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          cache-dependency-path: react-native-simple/android/gradle/wrapper/gradle-wrapper.properties

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        working-directory: ./react-native-simple
        run: npm install

      - name: Create debug keystore
        working-directory: ./react-native-simple/android/app
        run: |
          keytool -genkeypair -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      - name: Create assets directory
        run: mkdir -p react-native-simple/android/app/src/main/assets

      - name: Bundle JS for Android
        working-directory: ./react-native-simple
        run: npm run bundle:android

      - name: Build debug APK
        working-directory: ./react-native-simple/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clock2-react-native-debug-apk
          path: react-native-simple/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Verify APK file
        run: |
          APK_PATH="react-native-simple/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "APK built successfully! Size: $SIZE"
            echo "APK contains JS bundle:"
            unzip -l "$APK_PATH" | grep -E "(index.android.bundle|assets)" | head -10
          else
            echo "APK not found at $APK_PATH"
            exit 1
          fi
