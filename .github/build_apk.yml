name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          autoconf \
          automake \
          libtool \
          pkg-config
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer
    
    - name: Cache Buildozer dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
          ~/.android
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
    
    - name: Build APK
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        buildozer android debug
      timeout-minutes: 60
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: petalarm-apk
        path: bin/*.apk
    
    - name: Create Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
        tag_name: v3.0.${{ github.run_number }}
        name: 宠物闹钟 v3.0.${{ github.run_number }}
        body: |
          ## 宠物闹钟 Android APK
          
          ### 版本信息
          - 版本: v3.0.${{ github.run_number }}
          - 修复: 所有已知bug
          - 功能: 悬浮宠物、闹钟、倒计时
          
          ### 安装说明
          1. 下载 APK 文件
          2. 在 Android 设备上安装
          3. 授予悬浮窗权限
          
          ### 功能特点
          - 🐾 可爱的悬浮宠物
          - ⏰ 智能闹钟提醒
          - ⏱️ 倒计时功能
          - 😴 贪睡模式
          - 📳 振动提醒
          - 🔔 声音提醒
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
