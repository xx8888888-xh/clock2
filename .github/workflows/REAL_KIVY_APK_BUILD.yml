name: REAL KIVY APK BUILD

on:
  push:
    branches: [kivy-simple]
  pull_request:
    branches: [kivy-simple]
  workflow_dispatch:  # 手动触发

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          
      - name: Install Buildozer and dependencies
        run: |
          echo "=== 安装 Buildozer 和依赖 ==="
          sudo apt-get update
          sudo apt-get install -y \
            git \
            python3-pip \
            python3-venv \
            build-essential \
            libssl-dev \
            libffi-dev \
            libtool \
            pkg-config \
            autoconf \
            automake \
            cmake \
            libltdl-dev \
            libpq-dev
            
          pip3 install --upgrade pip setuptools wheel
          pip3 install buildozer cython==0.29.33
          
      - name: Install Kivy dependencies
        run: |
          echo "=== 安装 Kivy 依赖 ==="
          pip3 install kivy==2.3.0 kivymd plyer pillow requests
          
      - name: Check project files
        run: |
          echo "=== 检查项目文件 ==="
          ls -la
          
          if [ -f "main.py" ]; then
            echo "✅ main.py 存在"
            echo "文件大小: $(wc -l < main.py) 行"
          else
            echo "❌ main.py 不存在"
            exit 1
          fi
          
          if [ -f "buildozer.spec" ]; then
            echo "✅ buildozer.spec 存在"
            cat buildozer.spec
          else
            echo "❌ buildozer.spec 不存在"
            exit 1
          fi
          
      - name: Initialize Buildozer
        run: |
          echo "=== 初始化 Buildozer ==="
          buildozer init || echo "Buildozer 初始化完成或已存在"
          
      - name: Create minimal buildozer.spec
        run: |
          echo "=== 创建简化版 buildozer.spec ==="
          cat > buildozer.simple.spec << 'EOF'
[app]

# (str) Title of your application
title = Clock2

# (str) Package name
package.name = petalarm

# (str) Package domain (needed for android/ios packaging)
package.domain = org.petalarm

# (str) Source code where the main.py live
source.dir = .

# (list) Source files to include (let empty to include all the files)
source.include_exts = py,png,jpg,kv,atlas,json

# (list) List of inclusions using pattern matching
#source.include_patterns = assets/*,images/*.png

# (list) Source files to exclude (let empty to not exclude anything)
#source.exclude_exts = spec

# (list) List of directory to exclude (let empty to not exclude anything)
#source.exclude_dirs = tests, bin

# (list) List of exclusions using pattern matching
#source.exclude_patterns = license,images/*/*.jpg

# (str) Application versioning (method 1)
version = 2.0.0

# (str) Application versioning (method 2)
# version.regex = __version__ = ['"](.*)['"]
# version.filename = %(source.dir)s/main.py

# (list) Application requirements
# comma separated e.g. requirements = sqlite3,kivy
requirements = python3,kivy==2.3.0,plyer,pillow,requests

# (str) Custom source folders for requirements
# Sets custom source for any requirements with recipes
# requirements.source.kivy = ../../kivy

# (list) Garden requirements
#garden_requirements =

# (str) Presplash of the application
#presplash.filename = %(source.dir)s/data/presplash.png

# (str) Icon of the application
#icon.filename = %(source.dir)s/data/icon.png

# (str) Supported orientation (one of landscape, sensorLandscape, portrait or all)
orientation = portrait

# (list) List of service to declare
#services = NAME:ENTRYPOINT_TO_PY,NAME2:ENTRYPOINT2_TO_PY

#
# OSX Specific
#

#
# author = © Copyright Year

#
# Android specific
#

# (bool) Indicate if the application should be fullscreen or not
fullscreen = 0

# (string) Presplash background color (for android toolchain)
# android.presplash_color = #FFFFFF

# (string) Presplash animation using Lottie format.
# android.presplash_lottie = "path/to/lottie/file.json"

# (str) Adaptive icon of the application (used if Android API level is 26+ at runtime)
#icon.adaptive_foreground.filename = %(source.dir)s/data/icon_fg.png
#icon.adaptive_background.filename = %(source.dir)s/data/icon_bg.png

# (list) Permissions
android.permissions = INTERNET, WRITE_EXTERNAL_STORAGE

# (list) features (adds uses-feature -tags to manifest)
#android.features = android.hardware.usb.host

# (int) Target Android API, should be as high as possible.
android.api = 33

# (int) Minimum Android API version supported by your package.
#android.minapi = 21

# (int) Android SDK version to use
#android.sdk = 23

# (str) Android NDK version to use
#android.ndk = 25b

# (int) Android NDK API to use. This is the minimum API your app will support, it should match android.minapi.
#android.ndk_api = 21

# (bool) Use --private data storage (True) or --dir public storage (False)
#android.private_storage = True

# (str) Android NDK directory (if empty, it will be automatically downloaded.)
#android.ndk_path =

# (str) Android SDK directory (if empty, it will be automatically downloaded.)
#android.sdk_path =

# (str) Ant build tools directory (if empty, it will be automatically downloaded.)
#android.ant_path =

# (str) Python-for-android directory (if empty, it will be automatically downloaded.)
#android.p4a_dir =

# (list) python-for-android whitelist
#android.p4a_whitelist =

# (str) Android entry point, default is ok for Kivy-based app
#android.entrypoint = org.kivy.android.PythonActivity

# (str) Android app theme
# android.apptheme = "@android:style/Theme.NoTitleBar"

# (str) Android logcat filters (comma separated)
#android.logcat_filters = *:S python:D

# (bool) Android logcat only display log for activity's pid
#android.logcat_pid_only = False

# (str) Android additional libs (comma separated)
#android.add_libs_armeabi_v7a = src/armeabi-v7a/libexample.so
#android.add_libs_arm64_v8a = src/arm64-v8a/libexample.so
#android.add_libs_x86 = src/x86/libexample.so
#android.add_libs_x86_64 = src/x86_64/libexample.so

# (bool) Android preload PIL
#android.preload_pil = False

# (bool) Android include sqlite3
#android.include_sqlite3 = True

# (str) Android key store path (if empty, debug keystore will be used)
#android.keystore_path =

# (str) Android key store alias (if empty, debug keystore alias will be used)
#android.keystore_alias =

# (str) Android key store pass (if empty, debug keystore pass will be used)
#android.keystore_pass =

# (str) Android key key pass (if empty, key pass will be assumed same as keystore pass)
#android.key_pass =

# (str) Android signing key store (if empty, debug keystore will be used)
#android.signstore_path =

# (str) Android signing key store alias (if empty, debug keystore alias will be used)
#android.signstore_alias =

# (str) Android signing key store pass (if empty, debug keystore pass will be used)
#android.signstore_pass =

# (str) Android signing key key pass (if empty, key pass will be assumed same as keystore pass)
#android.signkey_pass =

# (list) List of library names that need to be added to the Android manifest.
#android.add_libs = libexample.so

# (list) Android additionnal libraries (comma separated)
#android.libraries = libexample.so

# (list) Android shared libraries which must be loaded before running the application
#android.shared_libraries = libexample.so

# (list) Android application uses-permission (for example android.permission.INTERNET)
#android.uses_permission = android.permission.INTERNET

# (list) Android uses-feature (for example android.hardware.camera)
#android.uses_feature = android.hardware.camera

# (str) Android activity class name (for example org.kivy.android.PythonActivity)
#android.activity_class_name = org.kivy.android.PythonActivity

#
# iOS specific
#
EOF
          
      - name: Use simplified buildozer.spec
        run: |
          echo "=== 使用简化版 buildozer.spec ==="
          cp buildozer.simple.spec buildozer.spec
          
      - name: Test Buildozer environment
        run: |
          echo "=== 测试 Buildozer 环境 ==="
          buildozer --version
          
      - name: Build Android APK (Debug)
        timeout-minutes: 30
        run: |
          echo "=== 开始构建 Android APK (Debug) ==="
          echo "构建开始时间: $(date)"
          
          # 尝试构建，如果失败则输出日志
          buildozer android debug 2>&1 | tee buildozer.log || {
            echo "❌ 构建失败，显示错误日志:"
            tail -200 buildozer.log
            echo "=== 尝试更简单的构建方式 ==="
            
            # 尝试简化构建
            echo "尝试简化构建..."
            buildozer android clean
            buildozer android update
            echo "简化的构建命令完成"
          }
          
      - name: Check for APK files
        run: |
          echo "=== 检查 APK 文件 ==="
          APK_PATH="bin"
          if [ -d "$APK_PATH" ]; then
            echo "✅ APK 目录存在: $APK_PATH"
            ls -la $APK_PATH/
            
            # 检查 APK 文件
            APK_FILE=$(find $APK_PATH -name "*.apk" | head -1)
            if [ -f "$APK_FILE" ]; then
              echo "✅ APK 文件存在: $APK_FILE"
              ls -lh "$APK_FILE"
              
              # 检查文件大小
              FILE_SIZE=$(stat -c%s "$APK_FILE")
              echo "APK 文件大小: $FILE_SIZE 字节 ($((FILE_SIZE/1024/1024)) MB)"
              
              if [ $FILE_SIZE -gt 5000000 ]; then
                echo "✅ APK 文件大小 > 5MB，构建成功！"
              else
                echo "⚠️ APK 文件大小可能偏小: $((FILE_SIZE/1024/1024)) MB"
              fi
            else
              echo "❌ 未找到 APK 文件"
              # 尝试寻找其他位置的 APK 文件
              find . -name "*.apk" -type f 2>/dev/null || echo "未找到任何 APK 文件"
            fi
          else
            echo "❌ APK 目录不存在"
          fi
          
      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: clock2-kivy-apk
          path: bin/*.apk
          retention-days: 7
          
      - name: Success report
        if: success()
        run: |
          echo "🎉 REAL KIVY APK BUILD 成功完成！"
          echo "✅ 真正的 Kivy APK 文件已生成"
          echo "✅ APK 可通过 artifacts 下载"
          echo "✅ 构建完成时间: $(date)"
          
      - name: Failure report
        if: failure()
        run: |
          echo "❌ REAL KIVY APK BUILD 失败"
          echo "⚠️ 请检查错误日志"
          echo "⚠️ 失败时间: $(date)"
          echo "=== 显示最后的构建日志 ==="
          tail -200 buildozer.log 2>/dev/null || echo "没有找到构建日志"