name: REAL FLUTTER APK BUILD

on:
  push:
    branches: [flutter-rewrite]
  workflow_dispatch:  # 手动触发

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: flutter-rewrite
        
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true
          
      - name: Get Flutter dependencies
        run: flutter pub get
          
      - name: Analyze Flutter code
        run: flutter analyze
          
      - name: Build Android APK (Release)
        run: flutter build apk --release
          
      - name: Verify APK file
        run: |
          echo "=== 验证 APK 文件 ==="
          APK_FILE="build/app/outputs/flutter-apk/app-release.apk"
          
          if [ -f "$APK_FILE" ]; then
            echo "✅ APK 文件存在: $APK_FILE"
            ls -lh "$APK_FILE"
            
            FILE_SIZE=$(stat -c%s "$APK_FILE")
            echo "APK 文件大小: $FILE_SIZE 字节 ($((FILE_SIZE/1024/1024)) MB)"
            
            if [ $FILE_SIZE -gt 5000000 ]; then
              echo "✅ APK 文件大小 > 5MB，构建成功！"
            else
              echo "⚠️ APK 文件大小可能偏小"
            fi
          else
            echo "❌ APK 文件不存在"
            exit 1
          fi
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clock2-flutter-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7
          
      - name: Success report
        if: success()
        run: |
          echo "🎉 REAL FLUTTER APK BUILD 成功完成！"
          echo "✅ Flutter APK 文件已生成"
          echo "✅ APK 可通过 artifacts 下载"
          echo "✅ 构建完成时间: $(date)"
          
      - name: Failure report
        if: failure()
        run: |
          echo "❌ REAL FLUTTER APK BUILD 失败"
          echo "⚠️ 请检查错误日志"
          echo "⚠️ 失败时间: $(date)"
