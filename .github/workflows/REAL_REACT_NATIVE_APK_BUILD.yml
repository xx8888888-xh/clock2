          <View style={styles.petIcon}>
            <Text style={styles.petEmoji}>🐾</Text>
          </View>
          <Text style={styles.petText}>Floating Pet</Text>
        </View>
        
        <View style={styles.features}>
          <Text style={styles.feature}>✅ Alarm System</Text>
          <Text style={styles.feature}>✅ Floating Pet</Text>
          <Text style={styles.feature}>✅ Countdown Timer</Text>
          <Text style={styles.feature}>✅ Snooze Function</Text>
          <Text style={styles.feature}>✅ Vibration & Sound</Text>
          <Text style={styles.feature}>✅ JSON Storage</Text>
