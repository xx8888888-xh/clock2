name: REAL REACT NATIVE APK BUILD

on:
  push:
    branches: [react-native-rewrite]
  pull_request:
    branches: [react-native-rewrite]
  workflow_dispatch:  # 手动触发

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Create minimal React Native project
        run: |
          echo "=== 创建最小化 React Native 项目 ==="
          
          # 创建 package.json
          cat > package.json << 'EOF'
{
  "name": "clock2-react-native",
  "version": "1.0.0",
  "private": true,
  "scripts": {
    "android": "react-native run-android",
    "ios": "react-native run-ios",
    "start": "react-native start",
    "test": "jest",
    "lint": "eslint ."
  },
  "dependencies": {
    "react": "18.2.0",
    "react-native": "0.73.6",
    "react-native-screens": "^3.29.0",
    "react-native-safe-area-context": "^4.8.2"
  },
  "devDependencies": {
    "@babel/core": "^7.20.0",
    "@babel/preset-env": "^7.20.0",
    "@babel/runtime": "^7.20.0",
    "@react-native-community/eslint-config": "^3.2.0",
    "babel-jest": "^29.2.1",
    "eslint": "^8.19.0",
    "jest": "^29.2.1",
    "metro-react-native-babel-preset": "0.76.7",
    "react-test-renderer": "18.2.0"
  },
  "jest": {
    "preset": "react-native"
  }
}
EOF
          
          # 创建 App.js
          mkdir -p src
          cat > src/App.js << 'EOF'
import React from 'react';
