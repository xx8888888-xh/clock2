name: React Native Simple Test

on:
  push:
    branches: [ react-native-rewrite ]
  workflow_dispatch:

jobs:
  test-react-native:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Simple Check
      run: |
        echo "✅ React Native Simple Test Workflow"
        echo "✅ Branch: ${{ github.ref_name }}"
        echo "✅ Status: Running successfully"
        echo "✅ Time: $(date)"
        echo "✅ This proves the workflow can run"
    - name: Create Success File
      run: |
        echo "React Native Workflow Success" > react_native_success.txt
        echo "Time: $(date)" >> react_native_success.txt
    - name: Upload Proof
      uses: actions/upload-artifact@v4
      with:
        name: react-native-success-proof
        path: react_native_success.txt
