name: Build Flutter APK (Real)

on:
  push:
    branches: [ flutter-rewrite-clean ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: flutter-rewrite-clean

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true
          cache-dependency-path: '.github/workflows/flutter-real-build.yml'

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze || true

      - name: Build Debug APK
        run: flutter build apk --debug 2>&1

      - name: Verify APK
        run: |
          echo "=== APK验证 ==="
          APK_FILE="build/app/outputs/flutter-apk/*.apk"
          APK_COUNT=$(find build/app/outputs/flutter-apk/ -name "*.apk" -type f | wc -l)
          echo "Found APK files: $APK_COUNT"
          for APK in $(find build/app/outputs/flutter-apk/ -name "*.apk" -type f); do
            echo "APK: $APK"
            ls -lh "$APK"
            SIZE=$(stat -c%s "$APK")
            echo "Size: $((SIZE/1024/1024)) MB"
          done
          if [ $APK_COUNT -gt 0 ]; then
            echo "✅ Found APK files"
          else
            echo "❌ No APK files found"
            ls -la build/app/outputs/ 2>/dev/null || echo "No build dir"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clock2-flutter-real-apk
          path: build/app/outputs/flutter-apk/
          retention-days: 30

    timeout-minutes: 60
