name: Build Flutter APK (Real)

on:
  push:
    branches: [ flutter-rewrite-clean ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: flutter-rewrite-clean

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null | head -5 || echo "No platforms dir"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null | head -5 || echo "No build-tools dir"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cat android/local.properties

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze code
        run: dart analyze || true

      - name: Build Android APK (Release)
        run: flutter build apk --release 2>&1

      - name: Verify APK
        run: |
          echo "=== APK验证 ==="
          ls -lh build/app/outputs/flutter-apk/*.apk 2>/dev/null || echo "No APK found in flutter-apk dir"
          APK=$(find build -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "Found APK: $APK"
            APK_SIZE=$(stat -c%s "$APK")
            echo "APK大小: $((APK_SIZE/1024/1024)) MB"
            if [ $APK_SIZE -gt 5000000 ]; then
              echo "✅ APK大于5MB，是真正的APK"
            fi
          else
            echo "❌ 未找到APK文件"
            ls -la build/app/outputs/ 2>/dev/null || echo "No build/app/outputs dir"
            ls -la build/ 2>/dev/null | head -20
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clock2-flutter-real-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

    timeout-minutes: 60
