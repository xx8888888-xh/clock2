name: Build Flutter APK (Real)

on:
  push:
    branches: [ flutter-rewrite-clean ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: flutter-rewrite-clean

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter code
        run: flutter analyze || true

      - name: Build Android APK (Release)
        run: |
          echo "=== BUILD START ==="
          echo "PWD: $(pwd)"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "JAVA_HOME: $JAVA_HOME"
          echo "=== Running flutter build ==="
          flutter build apk --release 2>&1 | tee /tmp/flutter_build.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== BUILD EXIT CODE: $EXIT_CODE ==="
          echo "=== LAST 50 LINES OF LOG ==="
          tail -50 /tmp/flutter_build.log
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== BUILD FAILED with exit code $EXIT_CODE ==="
            exit 1
          fi
          echo "=== BUILD COMPLETE ==="

      - name: Verify APK file
        run: |
          echo "=== APK验证 ==="
          APK_FILE="build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK_FILE" ]; then
            echo "✅ APK 文件存在: $APK_FILE"
            ls -lh "$APK_FILE"
            FILE_SIZE=$(stat -c%s "$APK_FILE")
            echo "APK 文件大小: $FILE_SIZE 字节 ($((FILE_SIZE/1024/1024)) MB)"
            if [ $FILE_SIZE -gt 5000000 ]; then
              echo "✅ APK 文件大小 > 5MB，构建成功！"
            fi
          else
            echo "❌ APK 文件不存在"
            ls -la build/app/outputs/ 2>/dev/null || echo "No outputs dir"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clock2-flutter-real-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Success report
        if: success()
        run: |
          echo "🎉 APK BUILD 成功完成！"

      - name: Failure report
        if: failure()
        run: |
          echo "❌ APK BUILD 失败"

    timeout-minutes: 60
