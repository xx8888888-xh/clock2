name: Flutter Simple Test

on:
  push:
    branches: [ flutter-rewrite ]
  workflow_dispatch:

jobs:
  test-flutter:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Simple Check
      run: |
        echo "✅ Flutter Simple Test Workflow"
        echo "✅ Branch: ${{ github.ref_name }}"
        echo "✅ Status: Running successfully"
        echo "✅ Time: $(date)"
        echo "✅ This proves the workflow can run"
    - name: Create Success File
      run: |
        echo "Flutter Workflow Success" > flutter_success.txt
        echo "Time: $(date)" >> flutter_success.txt
    - name: Upload Proof
      uses: actions/upload-artifact@v4
      with:
        name: flutter-success-proof
        path: flutter_success.txt
