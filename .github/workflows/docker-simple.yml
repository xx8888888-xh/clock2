name: Build Simple APK with Docker

on:
  push:
    branches: [ kivy-simple ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Prepare app files
      run: |
        cp simplest_main.py main.py
        echo "kivy==2.0.0" > requirements.txt
        cat > buildozer.spec << 'EOF'
[app]
title = Clock2 Simple
package.name = clock2simple
package.domain = org.clock2
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
version = 1.0
requirements = python3,kivy==2.0.0
orientation = portrait
fullscreen = 0

[buildozer]
log_level = 2
warn_on_root = 1

# Android specific
android.p4a_dir = .p4a
android.arch = arm64-v8a
android.permissions = INTERNET
EOF
    
    - name: Build with Docker Buildozer
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/home/kivy/app \
          -w /home/kivy/app \
          kivy/buildozer:latest \
          buildozer -v android debug
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: clock2-simple-apk
        path: bin/*.apk