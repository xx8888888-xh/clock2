name: React Native REAL APK Build

on:
  push:
    branches: [ react-native-rewrite ]
  workflow_dispatch:

jobs:
  build-react-native-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: react-native-rewrite
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Create React Native Project
      run: |
        echo "=== 创建 React Native 项目 ==="
        npx @react-native-community/cli@latest init Clock2App --pm npm --skip-install
        cd Clock2App
        
        # 安装依赖
        npm install
        
        # 检查android目录
        echo "=== Android 目录结构 ==="
        ls -la android/
        
        # 设置ANDROID_HOME
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "PATH=$PATH:$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_ENV
        
    - name: Build Debug APK
      run: |
        echo "=== 构建 Debug APK ==="
        cd Clock2App
        
        # 设置环境变量
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$PATH:$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin
        
        # 构建APK
        cd android
        ./gradlew assembleDebug --no-daemon -q
        
        # 检查APK
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "✅ APK 生成成功"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
        else
          echo "❌ APK 生成失败"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "目录不存在"
          exit 1
        fi
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: react-native-clock2-apk
        path: Clock2App/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    - name: Verify APK
      run: |
        echo "=== 验证 APK ==="
        APK_PATH="Clock2App/android/app/build/outputs/apk/debug/app-debug.apk"
        if [ -f "$APK_PATH" ]; then
          SIZE=$(stat -c%s "$APK_PATH")
          echo "APK 大小: $((SIZE/1024/1024)) MB"
          if [ $SIZE -gt 5000000 ]; then
            echo "✅ APK 大小 > 5MB"
          fi
        fi
        
    - name: Success Report
      if: success()
      run: |
        echo "🎉 React Native APK 构建成功！"
        echo "分支: react-native-rewrite"
        echo "时间: $(date)"
