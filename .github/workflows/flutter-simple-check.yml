name: Flutter Simple Check

on:
  push:
    branches: [ flutter-rewrite ]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - name: Check Flutter branch
      run: |
        echo "Flutter branch checked: flutter-rewrite"
        echo "Flutter project is available for local build"
        echo "Use: flutter build apk --release"