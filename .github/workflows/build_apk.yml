name: Build Android APK

on:
  push:
    branches: [ kivy-simple ]
  pull_request:
    branches: [ kivy-simple ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          python3-pip \
          python3-venv \
          libffi-dev \
          libssl-dev \
          libjpeg-dev \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libreadline-dev \
          libsqlite3-dev \
          libgdbm-dev \
          libdb5.3-dev \
          libbz2-dev \
          libexpat1-dev \
          liblzma-dev \
          tk-dev \
          libgstreamer1.0-0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good
    
    - name: Install Buildozer and dependencies
      run: |
        pip3 install --upgrade pip setuptools wheel
        pip3 install buildozer
        pip3 install cython==0.29.33
        pip3 install kivy==2.3.0
    
    - name: Initialize Buildozer
      run: |
        echo "初始化Buildozer..."
        buildozer init
        echo "Buildozer初始化完成"
    
    - name: Build Android APK (debug)
      run: |
        echo "开始构建Android APK..."
        # 设置环境变量避免交互式提示
        export BUILDOZER_PROMPT_ACCEPT=1
        export BUILDOZER_NONINTERACTIVE=1
        
        # 尝试构建debug版本
        buildozer -v android debug 2>&1 | tee build.log
        
        # 检查是否生成APK
        if ls -la bin/*.apk 2>/dev/null; then
          echo "✅ APK构建成功！"
          APK_FILE=$(ls -la bin/*.apk | head -1 | awk '{print $9}')
          echo "APK文件: $APK_FILE"
          echo "文件大小: $(du -h $APK_FILE | cut -f1)"
        else
          echo "❌ APK构建失败"
          echo "构建日志最后50行:"
          tail -50 build.log
          exit 1
        fi
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: clock2-apk
        path: bin/*.apk
        retention-days: 7
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: build-logs
        path: build.log
        retention-days: 7
    
    - name: Success notification
      if: success()
      run: |
        echo "🎉 Android APK构建成功完成！"
        echo "APK文件可在Artifacts中下载"
        echo "分支: ${{ github.ref }}"
        echo "提交: ${{ github.sha }}"