name: Build Android APK (Fixed Buildozer)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-dev python3-venv \
            git zip unzip openjdk-17-jdk-headless \
            build-essential ccache libffi-dev libssl-dev \
            libxml2-dev libxslt1-dev libncurses5-dev \
            libgdbm-dev libreadline-dev libz-dev \
            libbz2-dev libsqlite3-dev libffi-dev zlib1g-dev
            
      - name: Install buildozer
        run: pip3 install buildozer cython==0.29.33
            
      - name: Install Android SDK
        run: |
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip
          mkdir -p ~/android/cmdline-tools
          mv cmdline-tools ~/android/cmdline-tools/latest
          export ANDROID_HOME=~/android
          export ANDROID_SDK_ROOT=~/android
          
      - name: Build APK
        run: |
          cp main.py main.py
          buildozer android debug
            
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: clock2-apk
          path: ./bin/*.apk
          retention-days: 7