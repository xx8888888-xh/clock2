name: React Native Simple Check

on:
  push:
    branches: [ react-native-rewrite ]

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Check React Native project structure
      run: |
        echo "Checking React Native project..."
        
        if [ -f "package.json" ]; then
          echo "✅ package.json exists"
        else
          echo "❌ package.json missing"
        fi
        
        if [ -f "app.json" ]; then
          echo "✅ app.json exists"
        else
          echo "❌ app.json missing"
        fi
    
    - name: Validate
      run: |
        echo "✅ React Native project structure validated"
        echo "Branch: react-native-rewrite"
