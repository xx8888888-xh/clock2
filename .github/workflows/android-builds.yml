name: Android APK Build (Fixed NDK)

on:
  push:
    branches: [ architecture-rework, main ]
  pull_request:
    branches: [ architecture-rework, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          sdk-components: "platforms;android-34 build-tools;34.0.0 platform-tools"
          ndk-version: "r28c"

      - name: Set environment variables
        run: |
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
          echo "BUILDOZER_WARN_ON_ROOT=0" >> $GITHUB_ENV
          echo "=== SDK ==="
          ls $ANDROID_SDK_ROOT/
          echo "=== NDK ==="
          ls $ANDROID_NDK_HOME/

      - name: Accept SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer

      - name: Configure build
        run: |
          cp buildozer_android.spec buildozer.spec 2>/dev/null || true
          ls -lh icon.png 2>/dev/null || echo "No icon.png"
          echo "=== buildozer.spec check ==="
          grep -E "^android|ndk|ndk_dir|android_api|minapi" buildozer.spec 2>/dev/null | head -10

      - name: Build APK
        run: |
          export JAVA_HOME=$JAVA_HOME
          export ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT
          export ANDROID_NDK_HOME=$ANDROID_NDK_HOME
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export BUILDOZER_WARN_ON_ROOT=0
          
          echo "=== Env check ==="
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "NDK version: $(cat $ANDROID_NDK_HOME/source.properties 2>/dev/null | grep 'Pkg.Revision' | head -1)"
          
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
          BUILDOZER_EXIT=$?
          echo "BUILDOZER_EXIT=$BUILDOZER_EXIT"
          
          if [ "$BUILDOZER_EXIT" -ne 0 ] || ! ls bin/*.apk 2>/dev/null; then
            echo "=== Build failed, checking log ==="
            grep -n "Error\|error\|failed\|Failed\|ERROR\|recipe\|Command failed\|404\|not found" build.log | \
              grep -v "^2026\|\.py.*Error\|log_level\|DEBUG\|colorama\|jinja2\|appdirs\|sh>=2" | tail -20
            exit 1
          fi
          echo "=== APK built successfully ==="
          ls -lh bin/*.apk

      - name: Show build log tail
        if: always()
        run: |
          echo "=== Build log (last 100 lines) ==="
          tail -100 build.log 2>/dev/null || echo "No build log"
          echo "=== bin/ directory ==="
          ls -lhR bin/ 2>/dev/null || echo "No bin/"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: petalarm-architecture-rework-apk
          path: bin/*.apk
          retention-days: 7

      - name: Verify APK size
        if: success()
        run: |
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(stat -c%s "$APK")
            SIZE_MB=$(echo "scale=2; $SIZE/1048576" | bc)
            echo "APK: $APK"
            echo "Size: $SIZE bytes (${SIZE_MB} MB)"
            if [ "$SIZE" -lt 5242880 ]; then
              echo "WARNING: APK < 5MB"
            else
              echo "SUCCESS: APK is ${SIZE_MB} MB"
            fi
          fi
