name: Android APK Build (v13 - NDK at exact path with correct source.properties)

on:
  push:
    branches: [ architecture-rework, main ]
  pull_request:
    branches: [ architecture-rework, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download SDK
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p $SDK_DIR
          if [ ! -f "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" ]; then
            cd /tmp && curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o cmdline.zip
            unzip -q cmdline.zip && mkdir -p $SDK_DIR/cmdline-tools
            mv cmdline-tools $SDK_DIR/cmdline-tools/latest && rm cmdline.zip
          fi
          export JAVA_HOME=$JAVA_HOME
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_DIR --licenses 2>/dev/null || true
          $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_DIR \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -3

      - name: Download AND install NDK (r28c) at exact buildozer path with correct source.properties
        run: |
          export JAVA_HOME=$JAVA_HOME
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          
          # Download NDK r28c
          if [ ! -d "/tmp/android-ndk-r28c" ]; then
            echo "Downloading NDK r28c..."
            cd /tmp && curl -sL "https://dl.google.com/android/repository/android-ndk-r28c-linux.zip" -o ndk.zip
            unzip -q ndk.zip && echo "NDK downloaded"
          fi
          
          # Install at buildozer's exact expected path
          # buildozer android.py looks for: $HOME/.buildozer/android/platform/android-ndk-<version>/
          BUILDOZER_NDK="$HOME/.buildozer/android/platform/android-ndk-27.3.13750724"
          mkdir -p $(dirname $BUILDOZER_NDK)
          rm -rf "$BUILDOZER_NDK"
          cp -a /tmp/android-ndk-r28c/. $BUILDOZER_NDK/
          
          # CRITICAL: patch source.properties so buildozer recognizes this as version 27.3.13750724
          cat > $BUILDOZER_NDK/source.properties << 'EOF'
Pkg.Desc = Android NDK
Pkg.Revision = 27.3.13750724
Pkg.BaseRevision = 28.2.13676358
Pkg.ReleaseName = r28c
EOF
          
          # Also install in SDK's ndk/ directory (buildozer also checks this)
          mkdir -p $SDK_DIR/ndk
          rm -rf $SDK_DIR/ndk/27.3.13750724
          ln -sfn $BUILDOZER_NDK $SDK_DIR/ndk/27.3.13750724
          
          echo "=== NDK installed at buildozer path ==="
          cat $BUILDOZER_NDK/source.properties
          echo "=== SDK NDK dir ==="
          ls $SDK_DIR/ndk/
          echo "=== NDK tools check ==="
          ls $BUILDOZER_NDK/

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer

      - name: Configure build
        run: |
          if [ -f buildozer_android.spec ]; then
            cp buildozer_android.spec buildozer.spec
          elif [ -f buildozer.spec ]; then
            echo "Using existing buildozer.spec"
          else
            echo "No spec file found"
          fi
          if [ -f buildozer.spec ]; then
            if ! grep -q "^ndk_dir" buildozer.spec; then
              echo "ndk_dir = $HOME/.buildozer/android/platform/android-ndk-27.3.13750724" >> buildozer.spec
            fi
            grep -E "^ndk_" buildozer.spec || true
          fi

      - name: Patch buildozer android.py (accept installed NDK, no re-download)
        run: |
          PIP_LOC=$(pip show buildozer 2>/dev/null | grep "^Location:" | awk '{print $2}')
          BUILDOZER_ANDROID="$PIP_LOC/buildozer/targets/android.py"
          
          if [ -f "$BUILDOZER_ANDROID" ]; then
            echo "Patching buildozer: $BUILDOZER_ANDROID"
            
            # Patch 1: Accept our installed NDK version (don't re-download)
            # Change "27.3.13750724" to "28c" in version strings used for URL construction
            sed -i 's|"27\.3\.13750724"|"28c"|g' "$BUILDOZER_ANDROID"
            
            # Patch 2: Also patch the get_available_ndk_versions to include our version
            # The method reads from ANDROID_SDK_ROOT/ndk/ which we already set up
            # No extra patch needed if source.properties is correct
            
            echo "=== After patch, version strings ==="
            grep -n '"27\.3\.13750724"\|"28c"\|version\s*=' "$BUILDOZER_ANDROID" | head -10
          fi
          
          # Clear cache
          find "$PIP_LOC" -name "__pycache__" -type d 2>/dev/null | xargs rm -rf 2>/dev/null || true
          find "$PIP_LOC" -name "*.pyc" -delete 2>/dev/null || true
          echo "Cache cleared"

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          BUILDOZER_WARN_ON_ROOT: '0'
        run: |
          export JAVA_HOME=$JAVA_HOME
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-27.3.13750724
          export ANDROID_NDK_ROOT=$HOME/.buildozer/android/platform/android-ndk-27.3.13750724
          export BUILDOZER_WARN_ON_ROOT=0

          echo "=== NDK ==="
          cat $ANDROID_NDK_HOME/source.properties
          echo "=== SDK NDK ==="
          ls $ANDROID_SDK_ROOT/ndk/
          cat $ANDROID_SDK_ROOT/ndk/27.3.13750724/source.properties

          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
          BUILDOZER_EXIT=$?

          if [ "$BUILDOZER_EXIT" -ne 0 ] || ! ls bin/*.apk 2>/dev/null; then
            echo "=== Errors ==="
            grep -n "Error\|404\|not found\|failed\|Failed\|ERROR\|recipe\|Command failed" build.log | \
              grep -v "^2026\|\.py.*Error\|log_level\|DEBUG\|colorama\|jinja2\|appdirs\|sh>=2" | tail -20
            exit 1
          fi
          echo "=== APK built ==="
          ls -lh bin/*.apk

      - name: Show build log
        if: always()
        run: tail -60 build.log 2>/dev/null || echo "No log"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: petalarm-architecture-rework-apk
          path: bin/*.apk
          retention-days: 7

      - name: Verify APK
        if: success()
        run: |
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          [ -n "$APK" ] && echo "APK: $APK ($(( $(stat -c%s "$APK") / 1048576 )) MB)"
