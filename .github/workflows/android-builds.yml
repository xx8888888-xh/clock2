name: Android APK Build (v20 - base64 inline Python)

on:
  push:
    branches: [ architecture-rework, main ]
  pull_request:
    branches: [ architecture-rework, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download SDK
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p $SDK_DIR
          if [ ! -f "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" ]; then
            cd /tmp && curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o cmdline.zip
            unzip -q cmdline.zip && mkdir -p $SDK_DIR/cmdline-tools
            mv cmdline-tools $SDK_DIR/cmdline-tools/latest && rm cmdline.zip
          fi
          export JAVA_HOME=$JAVA_HOME
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_DIR --licenses 2>/dev/null || true
          $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_DIR \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -3

      - name: Download NDK r28c into buildozer cache
        run: |
          export JAVA_HOME=$JAVA_HOME
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          if [ ! -d "/tmp/android-ndk-r28c" ]; then
            echo "Downloading NDK r28c..."
            cd /tmp && curl -sL "https://dl.google.com/android/repository/android-ndk-r28c-linux.zip" -o ndk.zip
            unzip -q ndk.zip && echo "NDK downloaded"
          fi
          BUILDOZER_NDK="$HOME/.buildozer/android/platform/android-ndk-27.3.13750724"
          mkdir -p $(dirname $BUILDOZER_NDK)
          rm -rf "$BUILDOZER_NDK"
          cp -a /tmp/android-ndk-r28c/. $BUILDOZER_NDK/
          mkdir -p $SDK_DIR/ndk
          rm -rf $SDK_DIR/ndk/27.3.13750724
          ln -sfn $BUILDOZER_NDK $SDK_DIR/ndk/27.3.13750724
          echo "Pkg.Desc = Android NDK" > $BUILDOZER_NDK/source.properties
          echo "Pkg.Revision = 27.3.13750724" >> $BUILDOZER_NDK/source.properties
          echo "Pkg.BaseRevision = 28.2.13676358" >> $BUILDOZER_NDK/source.properties
          echo "Pkg.ReleaseName = r28c" >> $BUILDOZER_NDK/source.properties
          cat $BUILDOZER_NDK/source.properties

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer

      - name: Configure build
        run: |
          if [ -f buildozer_android.spec ]; then
            cp buildozer_android.spec buildozer.spec
          elif [ -f buildozer.spec ]; then
            echo "Using existing buildozer.spec"
          else
            echo "No spec file found"
          fi
          if [ -f buildozer.spec ]; then
            if ! grep -q "^ndk_dir" buildozer.spec; then
              echo "ndk_dir = $HOME/.buildozer/android/platform/android-ndk-27.3.13750724" >> buildozer.spec
            fi
            grep "^ndk_" buildozer.spec || true
          fi

      - name: Run Python patch script
        run: |
          export JAVA_HOME=$JAVA_HOME
          pip install buildozer > /dev/null 2>&1
          SCR=$(pip show buildozer 2>/dev/null | grep "^Location:" | awk '{print $2}')/buildozer/targets/android.py
          echo "Target: $SCR"
          python3 -c "import os, shutil, subprocess; t='$SCR'; print('Patching: ' + t); d=open(t).read(); n=len([x for x in __import__('re').findall('27.3.13750724', d)]); open(t,'w').write(d.replace('27.3.13750724','r28c')); print('Replaced ' + str(n) + ' occurrences'); [shutil.rmtree(os.path.join(p,'__pycache__'), ignore_errors=True) for p,x,c in os.walk(os.path.dirname(t)) if x==['__pycache__']]; [os.remove(os.path.join(p,f)) for p,x,c in os.walk(os.path.dirname(t)) for f in c if f.endswith('.pyc')]; print('Done')"

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          BUILDOZER_WARN_ON_ROOT: '0'
        run: |
          export JAVA_HOME=$JAVA_HOME
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-27.3.13750724
          export ANDROID_NDK_ROOT=$HOME/.buildozer/android/platform/android-ndk-27.3.13750724
          export BUILDOZER_WARN_ON_ROOT=0
          echo "NDK: $(cat $ANDROID_NDK_HOME/source.properties)"
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
          BUILDOZER_EXIT=$?
          if [ "$BUILDOZER_EXIT" -ne 0 ] || ! ls bin/*.apk 2>/dev/null; then
            grep -n "Error\|404\|not found\|failed\|Failed\|ERROR\|recipe\|Command failed" build.log | \
              grep -v "^2026\|\.py.*Error\|log_level\|DEBUG\|colorama\|jinja2\|appdirs\|sh>=2" | tail -20
            exit 1
          fi
          ls -lh bin/*.apk

      - name: Show build log
        if: always()
        run: tail -60 build.log 2>/dev/null || echo "No log"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: petalarm-architecture-rework-apk
          path: bin/*.apk
          retention-days: 7

      - name: Verify APK
        if: success()
        run: |
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          [ -n "$APK" ] && echo "APK: $APK ($(( $(stat -c%s "$APK") / 1048576 )) MB)"
