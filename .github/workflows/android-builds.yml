name: Android APK Build (v24 - better error detection + longer timeout)

on:
  push:
    branches: [ architecture-rework, main ]
  pull_request:
    branches: [ architecture-rework, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 58

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download SDK
        run: |
          BUILDOZER_SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p $BUILDOZER_SDK
          if [ ! -f "$BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager" ]; then
            cd /tmp && curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o cmdline.zip
            unzip -q cmdline.zip -d /tmp/sdk-unpack
            mkdir -p $BUILDOZER_SDK/cmdline-tools
            mv /tmp/sdk-unpack/cmdline-tools $BUILDOZER_SDK/cmdline-tools/latest
            rm -rf /tmp/sdk-unpack cmdline.zip
          fi
          mkdir -p $BUILDOZER_SDK/tools/bin
          ln -sfn $BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager $BUILDOZER_SDK/tools/bin/sdkmanager
          export JAVA_HOME=$JAVA_HOME
          yes | $BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$BUILDOZER_SDK --licenses 2>/dev/null || true
          $BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$BUILDOZER_SDK \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -3

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer

      - name: Configure build and fix NDK version
        run: |
          if [ -f buildozer_android.spec ]; then
            cp buildozer_android.spec buildozer.spec
          elif [ -f buildozer.spec ]; then
            echo "Using existing buildozer.spec"
          else
            echo "No spec file found"
          fi
          if [ -f buildozer.spec ]; then
            sed -i 's|android.ndk.*=.*27\.3\.13750724|android.ndk = 28c|' buildozer.spec
            grep "^android.ndk" buildozer.spec || true
          fi

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          BUILDOZER_WARN_ON_ROOT: '0'
        run: |
          export JAVA_HOME=$JAVA_HOME
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export BUILDOZER_WARN_ON_ROOT=0
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
          BUILDOZER_EXIT=${PIPESTATUS[0]}
          
          # Check if APK exists
          if ls bin/*.apk 2>/dev/null; then
            echo "=== APK found ==="
            ls -lh bin/*.apk
            exit 0
          fi
          
          # No APK - check for real errors in log
          echo "=== No APK found, checking for errors ==="
          grep -n "Error\|ERROR\|failed\|Failed\|Traceback\|Command failed\|cannot find\|No such file\|404" build.log | \
            grep -v "^2026\|\.py.*Error\|log_level\|DEBUG\|colorama\|jinja2\|appdirs\|sh>=2" | tail -30
          exit 1

      - name: Show build log (tail)
        if: always()
        run: |
          if [ -f build.log ]; then
            echo "=== Last 80 lines of build.log ==="
            tail -80 build.log
          else
            echo "No build.log found"
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: petalarm-architecture-rework-apk
          path: bin/*.apk
          retention-days: 7

      - name: Verify APK
        if: success()
        run: |
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          [ -n "$APK" ] && echo "APK: $APK ($(( $(stat -c%s "$APK") / 1048576 )) MB)"
