name: Android APK Build

on:
  push:
    branches: [ architecture-rework, main ]
  pull_request:
    branches: [ architecture-rework, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev \
            expect

      - name: Set environment variables
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> ~/.bashrc
          echo "PATH=/usr/lib/jvm/java-17-openjdk-amd64/bin:$PATH" >> ~/.bashrc
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724" >> $GITHUB_ENV

      - name: Accept system SDK licenses
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36

      - name: Configure build
        run: |
          cp buildozer_android.spec buildozer.spec
          ls -lh icon.png

      - name: Accept buildozer SDK licenses
        run: |
          # Pre-create the buildozer SDK directory and accept licenses
          # so buildozer doesn't prompt during build
          BUILDOZER_SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$BUILDOZER_SDK/cmdline-tools"
          if [ ! -f "$BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager" ]; then
            cd "$BUILDOZER_SDK/cmdline-tools"
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            mv cmdline-tools latest
            rm cmdline-tools.zip
          fi
          yes | "$BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$BUILDOZER_SDK" --licenses 2>/dev/null || true

      - name: Build APK
        run: |
          source ~/.bashrc
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
          export ANDROID_HOME=/usr/local/lib/android/sdk
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          # Run buildozer without pipe so exit code is captured
          buildozer android debug 2>&1 | tee build.log
          BUILDOZER_EXIT=${PIPESTATUS[0]}
          echo "BUILDOZER_EXIT=$BUILDOZER_EXIT"

      - name: Show build log tail
        if: always()
        run: |
          echo "=== Build log (last 150 lines) ==="
          tail -150 build.log 2>/dev/null || echo "No build log"
          echo "=== bin/ directory ==="
          ls -lhR bin/ 2>/dev/null || echo "No bin/ directory"
          echo "=== Build log grep for APK/apk ==="
          grep -n "apk\|APK\|bin/" build.log 2>/dev/null | head -20 || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: petalarm-debug-apk
          path: bin/*.apk
          retention-days: 5

      - name: Verify APK size
        if: success()
        run: |
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(stat -c%s "$APK")
            SIZE_MB=$(echo "scale=2; $SIZE/1048576" | bc)
            echo "APK: $APK"
            echo "Size: $SIZE bytes (${SIZE_MB} MB)"
            if [ "$SIZE" -lt 5242880 ]; then
              echo "WARNING: APK is smaller than 5MB"
              exit 1
            else
              echo "SUCCESS: APK is ${SIZE_MB} MB"
            fi
          else
            echo "ERROR: No APK found in bin/"
            exit 1
          fi
