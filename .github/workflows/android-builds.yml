name: Android APK Build (v4 - fix NDK path)

on:
  push:
    branches: [ architecture-rework, main ]
  pull_request:
    branches: [ architecture-rework, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download and install SDK
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p $SDK_DIR
          
          if [ ! -f "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" ]; then
            cd /tmp
            curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o cmdline.zip
            unzip -q cmdline.zip
            mkdir -p $SDK_DIR/cmdline-tools
            mv cmdline-tools $SDK_DIR/cmdline-tools/latest
            rm cmdline.zip
          fi
          
          export JAVA_HOME=$JAVA_HOME
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_DIR --licenses 2>/dev/null || true
          $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_DIR \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -3

      - name: Download NDK r28c into buildozer cache (correct path)
        run: |
          export JAVA_HOME=$JAVA_HOME
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          
          # Download NDK r28c
          if [ ! -d "/tmp/android-ndk-r28c" ]; then
            echo "Downloading NDK r28c..."
            cd /tmp
            curl -sL "https://dl.google.com/android/repository/android-ndk-r28c-linux.zip" -o ndk.zip
            unzip -q ndk.zip
            echo "NDK downloaded"
          fi
          
          # buildozer looks for NDK at: ~/.buildozer/android/platform/android-ndk-<version>/
          # p4a default NDK version is 27c (27.3.xxxx series) — we put r28c there
          BUILDOZER_NDK="$HOME/.buildozer/android/platform/android-ndk-27.3.13750724"
          mkdir -p $(dirname $BUILDOZER_NDK)
          
          # Remove any existing wrong path
          rm -rf "$BUILDOZER_NDK"
          
          # Copy contents of extracted NDK (NOT the containing folder)
          cp -a /tmp/android-ndk-r28c/. $BUILDOZER_NDK/
          
          echo "=== Verifying NDK structure ==="
          echo "Expected contents of $BUILDOZER_NDK:"
          ls $BUILDOZER_NDK/
          echo "--- source.properties ---"
          cat $BUILDOZER_NDK/source.properties 2>/dev/null || echo "Not found"
          
          echo "=== SDK dir structure ==="
          ls $HOME/.buildozer/android/platform/

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer

      - name: Configure build
        run: |
          cp buildozer_android.spec buildozer.spec 2>/dev/null || true
          ls -lh

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          BUILDOZER_WARN_ON_ROOT: '0'
        run: |
          export JAVA_HOME=$JAVA_HOME
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-27.3.13750724
          export ANDROID_NDK_ROOT=$HOME/.buildozer/android/platform/android-ndk-27.3.13750724
          export BUILDOZER_WARN_ON_ROOT=0
          
          echo "=== Env ==="
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "NDK root check:"
          ls $ANDROID_NDK_HOME/
          echo "NDK build dir:"
          ls $ANDROID_NDK_HOME/build/ 2>/dev/null | head -5
          
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
          BUILDOZER_EXIT=$?
          
          if [ "$BUILDOZER_EXIT" -ne 0 ] || ! ls bin/*.apk 2>/dev/null; then
            echo "=== Errors ==="
            grep -n "Error\|404\|not found\|failed\|Failed\|ERROR\|recipe\|Command failed" build.log | \
              grep -v "^2026\|\.py.*Error\|log_level\|DEBUG\|colorama\|jinja2\|appdirs" | tail -20
            exit 1
          fi
          echo "=== APK built ==="
          ls -lh bin/*.apk

      - name: Show build log tail
        if: always()
        run: |
          tail -60 build.log 2>/dev/null || echo "No log"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: petalarm-architecture-rework-apk
          path: bin/*.apk
          retention-days: 7

      - name: Verify APK
        if: success()
        run: |
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          [ -n "$APK" ] && echo "APK: $APK ($(( $(stat -c%s "$APK") / 1048576 )) MB)"
