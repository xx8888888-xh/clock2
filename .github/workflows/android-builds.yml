name: Android APK Build

on:
  push:
    branches: [ architecture-rework, main ]
  pull_request:
    branches: [ architecture-rework, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-dev \
            python3-pip \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> ~/.bashrc
          echo "PATH=$JAVA_HOME/bin:$PATH" >> ~/.bashrc

      - name: Download Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> ~/.bashrc
          echo "PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools:$PATH" >> ~/.bashrc

      - name: Accept Android SDK licenses
        run: |
          source ~/.bashrc
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -5

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36

      - name: Configure build
        run: |
          # Use simplest_main.py as the main entry point
          cp buildozer_android.spec buildozer.spec
          # Ensure icon.png exists
          if [ ! -f icon.png ]; then
            python3 -c "from PIL import Image; img = Image.new('RGBA', (512, 512), (255, 100, 150, 255)); img.save('icon.png')" 2>/dev/null || echo 'icon placeholder' > icon.png
          fi

      - name: Build APK
        run: |
          source ~/.bashrc
          export ANDROID_NDK_HOME="$HOME/android-sdk/ndk/25.2.9519653"
          export ANDROID_NDK_API_LEVEL=21

          # Download and extract NDK if not present
          if [ ! -d "$ANDROID_NDK_HOME" ]; then
            mkdir -p $HOME/android-sdk/ndk
            cd $HOME/android-sdk/ndk
            wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip -O ndk.zip
            unzip -q ndk.zip
            mv android-ndk-r25c $ANDROID_NDK_HOME
            rm ndk.zip
          fi

          echo "NDK=$ANDROID_NDK_HOME"
          echo "SDK=$ANDROID_SDK_ROOT"

          buildozer android debug --verbose 2>&1 | tee build.log

      - name: Show build log tail
        if: always()
        run: |
          echo "=== Build log (last 80 lines) ==="
          tail -80 build.log 2>/dev/null || echo "No build log found"
          echo "=== bin/ directory ==="
          ls -lh bin/ 2>/dev/null || echo "No bin/ directory"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: petalarm-debug-apk
          path: bin/*.apk
          retention-days: 5

      - name: Verify APK size
        run: |
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(stat -c%s "$APK")
            echo "APK: $APK"
            echo "Size: $SIZE bytes ($(echo "scale=2; $SIZE/1048576" | bc) MB)"
            if [ "$SIZE" -lt 5242880 ]; then
              echo "WARNING: APK is smaller than 5MB"
              exit 1
            fi
          else
            echo "ERROR: No APK found in bin/"
            exit 1
          fi
