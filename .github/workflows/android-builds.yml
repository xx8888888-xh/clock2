name: Android APK Build

on:
  push:
    branches: [ architecture-rework, main ]
  pull_request:
    branches: [ architecture-rework, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev

      - name: Set environment variables
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724" >> $GITHUB_ENV
          echo "PATH=/usr/lib/jvm/java-17-openjdk-amd64/bin:$PATH" >> $GITHUB_ENV

      - name: Show available Android SDK
        run: |
          echo "SDK: $ANDROID_SDK_ROOT"
          ls -la $ANDROID_SDK_ROOT/
          echo "--- NDK ---"
          ls -la $ANDROID_SDK_ROOT/ndk/ 2>/dev/null || echo "No NDK dir"

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36

      - name: Configure build
        run: |
          cp buildozer_android.spec buildozer.spec
          # Tell buildozer to use the pre-installed SDK/NDK and not re-download
          mkdir -p .buildozer
          echo "android.ndk_api = 21" >> buildozer.spec
          echo "android.allow_backup = True" >> buildozer.spec
          ls -lh icon.png
          cat buildozer.spec | grep -E "^android\.(api|ndk|minapi|archs|sdk)"

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          # Use pre-installed NDK version (27.3.13750724)
          buildozer android debug 2>&1 | tee build.log
          echo "Exit: $?"

      - name: Show build log tail
        if: always()
        run: |
          echo "=== Build log (last 100 lines) ==="
          tail -100 build.log 2>/dev/null || echo "No build log"
          echo "=== bin/ directory ==="
          ls -lhR bin/ 2>/dev/null || echo "No bin/ directory"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: petalarm-debug-apk
          path: bin/*.apk
          retention-days: 5

      - name: Verify APK size
        if: success()
        run: |
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(stat -c%s "$APK")
            SIZE_MB=$(echo "scale=2; $SIZE/1048576" | bc)
            echo "APK: $APK"
            echo "Size: $SIZE bytes (${SIZE_MB} MB)"
            if [ "$SIZE" -lt 5242880 ]; then
              echo "WARNING: APK is smaller than 5MB"
              exit 1
            else
              echo "SUCCESS: APK is ${SIZE_MB} MB"
            fi
          else
            echo "ERROR: No APK found in bin/"
            exit 1
          fi
