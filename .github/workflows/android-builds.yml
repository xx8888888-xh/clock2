name: Android APK Build

on:
  push:
    branches: [ architecture-rework, main ]
  pull_request:
    branches: [ architecture-rework, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev

      - name: Set environment variables
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> ~/.bashrc
          echo "PATH=/usr/lib/jvm/java-17-openjdk-amd64/bin:$PATH" >> ~/.bashrc
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/27.3.13750724" >> $GITHUB_ENV

      - name: Show system SDK contents
        run: |
          echo "=== System SDK ==="
          ls /usr/local/lib/android/sdk/
          echo "=== System NDK ==="
          ls /usr/local/lib/android/sdk/ndk/
          echo "=== cmdline-tools ==="
          ls /usr/local/lib/android/sdk/cmdline-tools/

      - name: Accept SDK licenses
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Create buildozer SDK symlinks
        run: |
          # Symlink buildozer's expected SDK path to the pre-installed system SDK
          mkdir -p /home/runner/.buildozer/android/platform
          ln -sfn /usr/local/lib/android/sdk /home/runner/.buildozer/android/platform/android-sdk
          echo "Symlink created: $(ls -la /home/runner/.buildozer/android/platform/android-sdk)"
          # buildozer looks for android-sdk/tools/bin/sdkmanager
          # The actual sdkmanager is at cmdline-tools/latest/bin/sdkmanager
          # Create tools/bin dir and symlink the actual binary
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/tools/bin
          ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          echo "tools/bin symlink: $(ls -la /home/runner/.buildozer/android/platform/android-sdk/tools/bin/)"
          # Verify
          ls /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager 2>/dev/null && echo "sdkmanager found at tools/bin" || echo "sdkmanager NOT found"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36

      - name: Configure build
        run: |
          cp buildozer_android.spec buildozer.spec
          ls -lh icon.png

      - name: Build APK
        run: |
          source ~/.bashrc
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
          export ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/27.3.13750724
          export ANDROID_HOME=/usr/local/lib/android/sdk
          echo "=== Env ==="
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "=== Verify buildozer SDK symlink ==="
          ls -la /home/runner/.buildozer/android/platform/android-sdk/ | head -5
          echo "=== Verify sdkmanager ==="
          /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --list 2>&1 | head -5
          echo "=== Starting buildozer ==="
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
          BUILDOZER_EXIT=$?
          echo "BUILDOZER_EXIT=$BUILDOZER_EXIT"
          if [ "$BUILDOZER_EXIT" -ne 0 ] || ! ls bin/*.apk 2>/dev/null; then
            echo "Buildozer failed or no APK produced, checking build.log for errors..."
            grep -n "Error\|error\|failed\|Failed\|ERROR\|recipe" build.log | grep -v "^2026\|\.py.*Error\|log_level" | tail -20
            exit 1
          fi
          echo "Build succeeded"

      - name: Show build log tail
        if: always()
        run: |
          echo "=== Build log (last 200 lines) ==="
          tail -200 build.log 2>/dev/null || echo "No build log"
          echo "=== bin/ directory ==="
          ls -lhR bin/ 2>/dev/null || echo "No bin/ directory"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: petalarm-debug-apk
          path: bin/*.apk
          retention-days: 5

      - name: Verify APK size
        if: success()
        run: |
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(stat -c%s "$APK")
            SIZE_MB=$(echo "scale=2; $SIZE/1048576" | bc)
            echo "APK: $APK"
            echo "Size: $SIZE bytes (${SIZE_MB} MB)"
            if [ "$SIZE" -lt 5242880 ]; then
              echo "WARNING: APK is smaller than 5MB"
              exit 1
            else
              echo "SUCCESS: APK is ${SIZE_MB} MB"
            fi
          else
            echo "ERROR: No APK found in bin/"
            exit 1
          fi
