name: Android APK Build (Fixed - NDK r25b)

on:
  push:
    branches: [ architecture-rework ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download and setup Android SDK
        run: |
          BUILDOZER_SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p $BUILDOZER_SDK

          if [ ! -f "$BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager" ]; then
            cd /tmp
            curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o cmdline.zip
            unzip -q cmdline.zip -d /tmp/sdk-unpack
            mkdir -p $BUILDOZER_SDK/cmdline-tools
            mv /tmp/sdk-unpack/cmdline-tools $BUILDOZER_SDK/cmdline-tools/latest
            rm -rf /tmp/sdk-unpack cmdline.zip
          fi

          mkdir -p $BUILDOZER_SDK/tools/bin
          ln -sfn $BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager $BUILDOZER_SDK/tools/bin/sdkmanager 2>/dev/null || true

          yes | $BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$BUILDOZER_SDK --licenses 2>/dev/null || true

          $BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$BUILDOZER_SDK \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5

      - name: Download Android NDK r25b
        run: |
          NDK_DIR="$HOME/.buildozer/android/platform/android-ndk-r25b"
          if [ ! -d "$NDK_DIR" ]; then
            echo "=== Downloading NDK r25b ==="
            cd /tmp
            curl -sL "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip" -o ndk.zip
            unzip -q ndk.zip
            mv android-ndk-r25b "$NDK_DIR"
            rm ndk.zip
            echo "NDK r25b installed"
          else
            echo "NDK r25b already present"
          fi

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer

      - name: Prepare buildozer.spec
        run: |
          if [ -f buildozer.spec ]; then
            echo "Using buildozer.spec"
          elif [ -f buildozer_android.spec ]; then
            cp buildozer_android.spec buildozer.spec
          else
            echo "No spec file found"
            exit 1
          fi
          grep "^android.ndk" buildozer.spec || true

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          BUILDOZER_WARN_ON_ROOT: '0'
          ANDROID_SDK_ROOT: ${{ env.HOME }}/.buildozer/android/platform/android-sdk
          ANDROID_NDK_HOME: ${{ env.HOME }}/.buildozer/android/platform/android-ndk-r25b
        run: |
          export JAVA_HOME=$JAVA_HOME
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r25b
          export ANDROID_NDK_ROOT=$HOME/.buildozer/android/platform/android-ndk-r25b
          export BUILDOZER_WARN_ON_ROOT=0
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: Verify APK
        run: |
          echo "=== Build log tail ==="
          tail -20 build.log
          echo ""
          echo "=== APK files ==="
          find . -name "*.apk" 2>/dev/null
          if [ -f bin/*.apk ]; then
            APK=$(ls bin/*.apk | head -1)
            echo "Size: $(du -h $APK | cut -f1)"
            unzip -l "$APK" 2>/dev/null | grep -c "classes.dex" | xargs echo "DEX files:"
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: clock2-architecture-rework-apk
          path: bin/*.apk
          retention-days: 30
