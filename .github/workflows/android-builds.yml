name: Android APK Build (v3 - pre-cache NDK)

on:
  push:
    branches: [ architecture-rework, main ]
  pull_request:
    branches: [ architecture-rework, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Android SDK command-line tools
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
          if [ ! -f "$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager" ]; then
            cd /tmp
            curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o cmdline.zip
            unzip -q cmdline.zip
            mv cmdline-tools $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest
            rm cmdline.zip
          fi
          echo "=== SDK cmdline-tools ready ==="

      - name: Accept SDK licenses and install platform
        run: |
          export JAVA_HOME=$JAVA_HOME
          SDK=$HOME/.buildozer/android/platform/android-sdk
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK --licenses 2>/dev/null || true
          $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5

      - name: Download NDK r28c and cache for buildozer
        run: |
          export JAVA_HOME=$JAVA_HOME
          SDK=$HOME/.buildozer/android/platform/android-sdk
          
          # Download NDK r28c to a temp location
          NDK_VERSION="28c"
          NDK_DIR="/tmp/android-ndk-r${NDK_VERSION}"
          
          if [ ! -d "$NDK_DIR" ]; then
            echo "Downloading Android NDK r${NDK_VERSION}..."
            cd /tmp
            curl -sL "https://dl.google.com/android/repository/android-ndk-r${NDK_VERSION}-linux.zip" -o ndk.zip
            unzip -q ndk.zip
            NDK_DIR="/tmp/android-ndk-r${NDK_VERSION}"
          fi
          
          echo "NDK downloaded to: $NDK_DIR"
          ls $NDK_DIR/
          
          # Create the NDK location that buildozer expects
          # buildozer looks for: ~/.buildozer/android/platform/android-ndk-<version>/
          # The NDK version p4a defaults to is r27c (the 27.3.xxx series)
          EXPECTED_NDK_PATH="$HOME/.buildozer/android/platform/android-ndk-27.3.13750724"
          mkdir -p $(dirname $EXPECTED_NDK_PATH)
          
          # Copy NDK to buildozer cache location
          echo "Caching NDK to: $EXPECTED_NDK_PATH"
          cp -r $NDK_DIR $EXPECTED_NDK_PATH
          
          # Also symlink in the SDK's ndk directory
          mkdir -p $SDK/ndk
          ln -sfn $EXPECTED_NDK_PATH $SDK/ndk/r28c 2>/dev/null || true
          
          echo "=== NDK cache populated ==="
          ls $HOME/.buildozer/android/platform/

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer

      - name: Configure build
        run: |
          cp buildozer_android.spec buildozer.spec 2>/dev/null || true
          echo "=== Project files ==="
          ls -lh
          echo "=== buildozer.spec key lines ==="
          grep -E "^#.*ndk|ndk |android_api|minapi|requirements" buildozer.spec 2>/dev/null | grep -v "^#" | head -10

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          BUILDOZER_WARN_ON_ROOT: '0'
        run: |
          export JAVA_HOME=$JAVA_HOME
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-27.3.13750724
          export ANDROID_NDK_ROOT=$HOME/.buildozer/android/platform/android-ndk-27.3.13750724
          export BUILDOZER_WARN_ON_ROOT=0
          
          echo "=== Build environment ==="
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "NDK contents:"
          ls $ANDROID_NDK_HOME/ | head -5
          
          echo "=== buildozer cache ==="
          ls $HOME/.buildozer/android/platform/
          
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
          BUILDOZER_EXIT=$?
          echo "BUILDOZER_EXIT=$BUILDOZER_EXIT"
          
          if [ "$BUILDOZER_EXIT" -ne 0 ] || ! ls bin/*.apk 2>/dev/null; then
            echo "=== Build errors ==="
            grep -n "Error\|404\|not found\|failed\|Failed\|ERROR\|recipe\|Command failed\|No module" build.log | \
              grep -v "^2026\|\.py.*Error\|log_level\|DEBUG\|colorama\|jinja2\|appdirs\|sh>=2" | tail -20
            exit 1
          fi
          echo "=== APK built ==="
          ls -lh bin/*.apk

      - name: Show build log tail
        if: always()
        run: |
          echo "=== Last 80 lines ==="
          tail -80 build.log 2>/dev/null || echo "No log"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: petalarm-architecture-rework-apk
          path: bin/*.apk
          retention-days: 7

      - name: Verify APK
        if: success()
        run: |
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(stat -c%s "$APK")
            echo "APK: $APK ($((SIZE/1048576)) MB)"
          fi
