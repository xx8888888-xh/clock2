name: Android APK Build (v11 - patch cloned p4a)

on:
  push:
    branches: [ architecture-rework, main ]
  pull_request:
    branches: [ architecture-rework, main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download SDK
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p $SDK_DIR
          if [ ! -f "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" ]; then
            cd /tmp && curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o cmdline.zip
            unzip -q cmdline.zip && mkdir -p $SDK_DIR/cmdline-tools
            mv cmdline-tools $SDK_DIR/cmdline-tools/latest && rm cmdline.zip
          fi
          export JAVA_HOME=$JAVA_HOME
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_DIR --licenses 2>/dev/null || true
          $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_DIR \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -3

      - name: Download NDK r28c into buildozer cache
        run: |
          export JAVA_HOME=$JAVA_HOME
          if [ ! -d "/tmp/android-ndk-r28c" ]; then
            echo "Downloading NDK r28c..."
            cd /tmp && curl -sL "https://dl.google.com/android/repository/android-ndk-r28c-linux.zip" -o ndk.zip
            unzip -q ndk.zip && echo "NDK downloaded"
          fi
          BUILDOZER_NDK="$HOME/.buildozer/android/platform/android-ndk-27.3.13750724"
          mkdir -p $(dirname $BUILDOZER_NDK)
          rm -rf "$BUILDOZER_NDK"
          cp -a /tmp/android-ndk-r28c/. $BUILDOZER_NDK/
          echo "=== NDK installed ==="
          cat $BUILDOZER_NDK/source.properties

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer

      - name: Configure build
        run: |
          if [ -f buildozer_android.spec ]; then
            cp buildozer_android.spec buildozer.spec
          elif [ -f buildozer.spec ]; then
            echo "Using existing buildozer.spec"
          else
            echo "No spec file found"
          fi
          if [ -f buildozer.spec ]; then
            if ! grep -q "^ndk_dir" buildozer.spec; then
              echo "ndk_dir = $HOME/.buildozer/android/platform/android-ndk-27.3.13750724" >> buildozer.spec
            fi
            if ! grep -q "^ndk_version" buildozer.spec; then
              echo "ndk_version = r28c" >> buildozer.spec
            fi
            grep -E "^ndk_" buildozer.spec || true
          fi

      - name: Pre-clone and patch python-for-android (the version buildozer actually uses)
        run: |
          export JAVA_HOME=$JAVA_HOME
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-27.3.13750724
          export ANDROID_NDK_ROOT=$HOME/.buildozer/android/platform/android-ndk-27.3.13750724
          export BUILDOZER_WARN_ON_ROOT=0
          
          # Create the p4a directory structure BEFORE buildozer clones it
          P4A_DIR="$HOME/.buildozer/android/platform/python-for-android"
          mkdir -p $(dirname $P4A_DIR)
          
          if [ ! -d "$P4A_DIR/.git" ]; then
            echo "Cloning p4a (no git history for speed)..."
            git clone --depth=1 --branch=master https://github.com/kivy/python-for-android.git "$P4A_DIR" 2>&1 | tail -3
          fi
          
          echo "=== Found p4a version ==="
          cd "$P4A_DIR" && git describe --tags 2>/dev/null || git rev-parse --short HEAD 2>/dev/null
          
          # Patch p4a NDK version: change 27.3.13750724 -> 28c in ALL .py files
          echo "=== Patching p4a NDK version ==="
          FIND_RESULT=$(find "$P4A_DIR" -name "*.py" -exec grep -l "27\.3\.13750724" {} \; 2>/dev/null | head -10)
          echo "Files with 27.3.13750724: $FIND_RESULT"
          find "$P4A_DIR" -name "*.py" -exec sed -i 's|27\.3\.13750724|28c|g' {} \; 2>/dev/null || true
          echo "Patched $(find "$P4A_DIR" -name "*.py" -exec grep -l "28c" {} \; 2>/dev/null | wc -l) files"
          
          # Also patch buildozer android.py
          BUILDOZER_PY=$(find /opt/hostedtoolcache /usr/local -name "android.py" -path "*/buildozer/targets/*" 2>/dev/null | head -1)
          if [ -f "$BUILDOZER_PY" ]; then
            echo "Patching buildozer: $BUILDOZER_PY"
            sed -i 's|27\.3\.13750724|28c|g' "$BUILDOZER_PY"
          fi
          
          # Clear cache
          find /opt/hostedtoolcache -name "__pycache__" -type d 2>/dev/null | xargs rm -rf 2>/dev/null || true
          find /opt/hostedtoolcache -name "*.pyc" -delete 2>/dev/null || true
          echo "=== Pre-clone and patch complete ==="

      - name: Build APK (with pre-patched p4a)
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          BUILDOZER_WARN_ON_ROOT: '0'
        run: |
          export JAVA_HOME=$JAVA_HOME
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-27.3.13750724
          export ANDROID_NDK_ROOT=$HOME/.buildozer/android/platform/android-ndk-27.3.13750724
          export BUILDOZER_WARN_ON_ROOT=0

          echo "=== NDK ==="
          cat $ANDROID_NDK_HOME/source.properties
          echo "=== p4a patched check ==="
          grep -r "28c" $HOME/.buildozer/android/platform/python-for-android/pythonforandroid/*.py 2>/dev/null | grep -v ".pyc" | head -5 || echo "p4a check done"

          set -o pipefail
          buildozer android debug 2>&1 | tee build.log
          BUILDOZER_EXIT=$?

          if [ "$BUILDOZER_EXIT" -ne 0 ] || ! ls bin/*.apk 2>/dev/null; then
            echo "=== Errors ==="
            grep -n "Error\|404\|not found\|failed\|Failed\|ERROR\|recipe\|Command failed" build.log | \
              grep -v "^2026\|\.py.*Error\|log_level\|DEBUG\|colorama\|jinja2\|appdirs\|sh>=2" | tail -20
            exit 1
          fi
          echo "=== APK built ==="
          ls -lh bin/*.apk

      - name: Show build log
        if: always()
        run: tail -60 build.log 2>/dev/null || echo "No log"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: petalarm-architecture-rework-apk
          path: bin/*.apk
          retention-days: 7

      - name: Verify APK
        if: success()
        run: |
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          [ -n "$APK" ] && echo "APK: $APK ($(( $(stat -c%s "$APK") / 1048576 )) MB)"
