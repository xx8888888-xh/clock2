# ============================================================
# Kivy APK 构建 - GitHub Actions 工作流（sdkmanager修复版）
#
# 修复的问题：
# 1. 使用 android-actions/setup-android@v3 替代手动sdkmanager
# 2. NDK r25b IN_LIST CMake 兼容性（flags.cmake补丁）
# 3. Python/Kivy/Cython 版本兼容性
# 4. APK 真实性验证（zipinfo + classes.dex 检查）
# ============================================================

name: Build Android APK (Fixed)

on:
  push:
    branches: [main, master, kivy-simple]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  ANDROID_NDK_VERSION: 'r25b'
  KIVY_VERSION: '2.3.0'
  CYTHON_VERSION: '0.29.36'
  BUILDOZER_VERSION: '1.6.0'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      # ─────────────────────────────────────────
      # 1. 检出代码
      # ─────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ─────────────────────────────────────────
      # 2. 安装系统依赖
      # ─────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-dev || true
          sudo apt-get install -y --no-install-recommends \
            build-essential git ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev \
            autoconf automake libtool pkg-config \
            libffi-dev libssl-dev liblzma-dev \
            unzip wget curl zipalign openjdk-17-jdk

      # ─────────────────────────────────────────
      # 3. Java 17
      # ─────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─────────────────────────────────────────
      # 4. Python 3.10
      # ─────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ─────────────────────────────────────────
      # 5. 安装 Python 依赖
      # ─────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python --version
          pip install --upgrade pip setuptools wheel
          pip install cython==${{ env.CYTHON_VERSION }}
          pip install kivy==${{ env.KIVY_VERSION }}
          pip install pillow plyer
          pip install buildozer==${{ env.BUILDOZER_VERSION }}
          pip list | grep -E "kivy|cython|buildozer|pillow"

      # ─────────────────────────────────────────
      # 6. Android SDK (使用可靠的actions)
      # ─────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ─────────────────────────────────────────
      # 7. Android NDK r25b
      # ─────────────────────────────────────────
      - name: Setup Android NDK r25b
        run: |
          echo "=== Downloading NDK ${{ env.ANDROID_NDK_VERSION }} ==="
          ANDROID_SDK_ROOT=$HOME/android-sdk
          NDK_DIR=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}
          mkdir -p $ANDROID_SDK_ROOT/ndk

          if [ ! -d "$NDK_DIR" ]; then
            cd /tmp
            wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O ndk.zip
            unzip -q ndk.zip
            mv android-ndk-r25b $NDK_DIR
            rm ndk.zip
          fi

          echo "ANDROID_NDK_ROOT=$NDK_DIR" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "=== NDK Ready ==="
          ls $NDK_DIR/

      # ─────────────────────────────────────────
      # 8. 修复 NDK r25b flags.cmake
      # ─────────────────────────────────────────
      - name: Patch NDK r25b CMake flags
        run: |
          echo "=== Patching NDK flags.cmake ==="
          NDK_FLAGS=$ANDROID_NDK_ROOT/build/cmake/flags.cmake

          if [ -f "$NDK_FLAGS" ]; then
            echo "Checking for IN_LIST issue..."
            if grep -q "IN_LIST.*ANDROID_SANITIZE" "$NDK_FLAGS"; then
              echo "Found IN_LIST issue, patching..."
              cp $NDK_FLAGS $NDK_FLAGS.bak
              sed -i 's/if( arg IN_LIST ANDROID_SANITIZE )/# if( arg IN_LIST ANDROID_SANITIZE ) # PATCHED/' $NDK_FLAGS
              echo "Patched successfully"
            else
              echo "No IN_LIST issue found"
            fi
          else
            echo "WARNING: flags.cmake not found at $NDK_FLAGS"
          fi

      # ─────────────────────────────────────────
      # 9. 准备构建环境
      # ─────────────────────────────────────────
      - name: Prepare build environment
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_NDK_ROOT=$ANDROID_NDK_HOME

          mkdir -p $HOME/.buildozer/android/platform
          ln -sf $ANDROID_SDK_ROOT $HOME/.buildozer/android/platform/android-sdk 2>/dev/null || true
          ln -sf $ANDROID_NDK_ROOT $HOME/.buildozer/android/platform/android-ndk-r25b 2>/dev/null || true

          echo "=== Environment ==="
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          ls -la $HOME/.buildozer/android/platform/

          if [ ! -f "buildozer.spec" ]; then
            echo "ERROR: buildozer.spec not found!"
            exit 1
          fi

      # ─────────────────────────────────────────
      # 10. 执行构建
      # ─────────────────────────────────────────
      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: '0'
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_NDK_ROOT=$ANDROID_NDK_HOME
          export ANDROID_NDK_HOME=$ANDROID_NDK_HOME
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH

          cd $GITHUB_WORKSPACE

          rm -rf bin/ .buildozer/
          mkdir -p bin/

          echo "=== Build started: $(date) ==="
          timeout 2700 buildozer android debug 2>&1 | tee buildozer_full.log
          BUILD_EXIT_CODE=$?
          echo "=== Build finished: $(date), exit code: $BUILD_EXIT_CODE ==="

          tail -80 buildozer_full.log

      # ─────────────────────────────────────────
      # 11. 验证 APK 真实性
      # ─────────────────────────────────────────
      - name: Verify APK
        run: |
          echo "=== Verifying APK ==="
          APK_FILE=$(find bin/ -name "*.apk" -type f 2>/dev/null | head -1)

          if [ -z "$APK_FILE" ]; then
            echo "ERROR: No APK found in bin/"
            ls -la bin/ 2>/dev/null || echo "bin/ does not exist"
            exit 1
          fi

          echo "APK: $APK_FILE"
          ls -lh "$APK_FILE"

          SIZE=$(stat -c%s "$APK_FILE")
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Size: $SIZE bytes ($SIZE_MB MB)"

          if [ $SIZE -lt 5000000 ]; then
            echo "ERROR: APK size $SIZE_MB MB < 5 MB"
            exit 1
          fi

          HEADER=$(head -c 4 "$APK_FILE" | xxd | head -1)
          if ! echo "$HEADER" | grep -q "504b"; then
            echo "ERROR: Not a valid ZIP/APK file"
            exit 1
          fi
          echo "ZIP header: OK"

          DEX_COUNT=$(unzip -l "$APK_FILE" 2>/dev/null | grep -c "classes.dex" || echo "0")
          echo "classes.dex count: $DEX_COUNT"

          if [ "$DEX_COUNT" -eq 0 ]; then
            echo "ERROR: No classes.dex found — APK is fake or broken!"
            exit 1
          fi
          echo "classes.dex: OK"

          SO_COUNT=$(unzip -l "$APK_FILE" 2>/dev/null | grep -c "\.so" || echo "0")
          echo "Native .so libraries: $SO_COUNT"

          echo ""
          echo "✅ APK verification PASSED"
          echo "✅ Size: $SIZE_MB MB (> 5 MB)"
          echo "✅ Contains $DEX_COUNT DEX file(s)"
          echo "✅ Contains $SO_COUNT native library files"

      # ─────────────────────────────────────────
      # 12. 上传
      # ─────────────────────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kivy-apk-${{ github.sha }}
          path: |
            bin/*.apk
            buildozer_full.log
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: buildozer_full.log
          retention-days: 30
