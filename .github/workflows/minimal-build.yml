name: Minimal APK Build

on:
  push:
    branches: [ kivy-simple ]
  workflow_dispatch:

jobs:
  build-minimal:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Create minimal Python script
      run: |
        cat > minimal_main.py << 'EOF'
print("Clock2 Minimal App - Hello from Android!")
while True:
    pass
EOF
    
    - name: Upload minimal script as artifact
      uses: actions/upload-artifact@v3
      with:
        name: minimal-clock2
        path: minimal_main.py