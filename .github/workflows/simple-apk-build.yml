name: Simple APK Build

on:
  workflow_dispatch:
  push:
    branches: [ kotlin-version ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        run: |
          python --version
          pip --version
          
      - name: Install Buildozer
        run: |
          pip install buildozer
          pip install cython
          
      - name: Install Kivy dependencies
        run: |
          pip install kivy==2.3.0
          pip install kivy-garden
          
      - name: Create minimal buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
[app]
title = Clock2 Fixed
package.name = clock2fixed
package.domain = org.test
source.dir = fixed_code
source.include_exts = py,png,jpg,kv,json
source.main = main.py
version = 1.0.0
requirements = python3,kivy==2.3.0
orientation = portrait
fullscreen = 0
log_level = 2
android.permissions = INTERNET
android.api = 33
android.minapi = 21
android.sdk = 34
android.ndk = 25b
android.archs = arm64-v8a

[buildozer]
log_level = 2
warn_on_root = 1
EOF
          
      - name: Build APK (debug)
        run: |
          cd fixed_code
          buildozer android debug || echo "Build failed, checking logs..."
          
      - name: Check for APK
        run: |
          if ls fixed_code/bin/*.apk 2>/dev/null; then
            echo "✅ APK file found!"
            ls -lh fixed_code/bin/*.apk
          else
            echo "❌ No APK file found"
            echo "Checking build directory..."
            find . -name "*.apk" -o -name "*.APK" | head -10
          fi
          
      - name: Upload APK if exists
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: clock2-apk-debug
          path: fixed_code/bin/*.apk
          if-no-files-found: warn
          retention-days: 7