name: Build Android APK (All Methods)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-kivy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-dev python3-venv \
            git zip unzip openjdk-17-jdk-headless \
            build-essential ccache libffi-dev libssl-dev \
            libxml2-dev libxslt1-dev libncurses5-dev \
            libgdbm-dev libreadline-dev libz-dev \
            libbz2-dev libsqlite3-dev libffi-dev zlib1g-dev
            
      - name: Install Buildozer
        run: |
          pip3 install --upgrade buildozer cython
          
      - name: Build APK
        run: |
          cp buildozer.yml buildozer.spec
          buildozer android debug deploy run logcat
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: clock2-kivy-apk
          path: ./bin/*.apk
          retention-days: 7