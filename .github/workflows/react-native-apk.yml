name: React Native APK Build

on:
  push:
    branches: [react-native-rewrite]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Delete stale package-lock.json
        working-directory: ./react-native-simple
        run: rm -f package-lock.json

      - name: Install npm dependencies
        working-directory: ./react-native-simple
        run: npm install

      - name: Build release APK
        working-directory: ./react-native-simple/android
        env:
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: |
          echo "=== BUILDING APK ==="
          ./gradlew assembleRelease --no-daemon -x lint 2>&1 | tee /tmp/gradle.log
          GRADLE_EXIT=$?
          echo "=== GRADLE EXIT CODE: $GRADLE_EXIT ==="
          tail -30 /tmp/gradle.log
          echo "=== APK FILES FOUND ==="
          find . -name "*.apk" -type f 2>/dev/null | tee /tmp/apk-list.log || true
          echo "=== APK BUILD COMPLETE ==="
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "GRADLE FAILED"
            exit 1
          fi

      - name: Find APK file
        id: find-apk
        run: |
          echo "=== Searching for release APK ==="
          find react-native-simple/android -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          APK_PATH=$(find react-native-simple/android -name "*.apk" -path "*/release/*" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find react-native-simple/android -name "*.apk" -type f 2>/dev/null | head -1)
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK_PATH=$APK_PATH"
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "ERROR: APK file not found!"
            echo "Contents of build dir:"
            ls -la react-native-simple/android/app/build/outputs/apk/ 2>/dev/null || echo "No outputs dir"
            exit 1
          fi
          echo "Found APK: $APK_PATH ($(du -h $APK_PATH | cut -f1))"

      - name: Verify bundle is inside APK
        run: unzip -l "${{ steps.find-apk.outputs.apk_path }}" | grep -E "bundle|assets" | head -10

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-native-clock2-apk-${{ github.run_number }}
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30

      - name: APK Size Verification
        run: |
          SIZE=$(du -h "${{ steps.find-apk.outputs.apk_path }}" | cut -f1)
          echo "✅ APK built successfully! Size: $SIZE"
