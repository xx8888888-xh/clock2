name: React Native APK Build

on:
  push:
    branches: [react-native-rewrite]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Delete stale package-lock.json
        working-directory: ./react-native-simple
        run: rm -f package-lock.json

      - name: Install npm dependencies
        working-directory: ./react-native-simple
        run: npm install

      - name: Run postinstall patch script
        working-directory: ./react-native-simple
        run: node scripts/patch-babel.js

      - name: Create JS bundle for release
        working-directory: ./react-native-simple
        env:
          CI: true
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: |
          echo "=== CREATING JS BUNDLE ==="
          mkdir -p android/app/src/main/assets
          rm -f android/app/src/main/assets/index.android.bundle
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            2>&1
          echo "Bundle exit: $?"
          if [ -f android/app/src/main/assets/index.android.bundle ]; then
            echo "Bundle created: $(du -h android/app/src/main/assets/index.android.bundle | cut -f1)"
          fi

      - name: Build release APK and capture exact path
        working-directory: ./react-native-simple/android
        id: gradle-build
        env:
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: |
          echo "=== BUILD APK ==="
          # First check what variants/tasks exist
          ./gradlew tasks --all --no-daemon 2>&1 | grep -i "assembleRelease\|createBundle" | head -20
          echo "=== RUNNING BUILD ==="
          ./gradlew app:assembleRelease --rerun-tasks --no-daemon -x lint --console=plain 2>&1 | tee /tmp/gradle.log
          GRADLE_EXIT=$?
          echo "=== GRADLE EXIT: $GRADLE_EXIT ==="
          # Extract APK path from Gradle output
          APK_IN_LOG=$(grep -oP 'file://\K[^ ]+\.apk' /tmp/gradle.log 2>/dev/null | head -1)
          if [ -z "$APK_IN_LOG" ]; then
            APK_IN_LOG=$(grep -oP '/[^\s]+\.apk' /tmp/gradle.log 2>/dev/null | head -1)
          fi
          echo "APK from log: $APK_IN_LOG"
          # List all outputs
          echo "=== OUTPUTS DIR ==="
          ls -laR app/build/outputs/ 2>/dev/null | head -60
          echo "=== APK FILES ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== GRADLE LOG END ==="
          tail -80 /tmp/gradle.log
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "BUILD FAILED"
            exit 1
          fi

      - name: Find APK
        id: find-apk
        run: |
          echo "=== FIND APK ==="
          # The APK must be somewhere in app/build/outputs/apk/release/
          # But also check the Gradle log for the exact path
          APK=""
          for path in \
            "react-native-simple/android/app/build/outputs/apk/release" \
            "react-native-simple/android/app/build/outputs/apk" \
            "react-native-simple/android/app/build/outputs" \
            "."; do
            if [ -d "$path" ]; then
              echo "Searching: $path"
              APK=$(find "$path" -name "*.apk" -type f 2>/dev/null | head -1)
              if [ -n "$APK" ]; then
                break
              fi
            fi
          done
          echo "Found APK: $APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "ERROR: APK not found!"
            echo "Full search:"
            find react-native-simple -type f -name "*.apk" 2>/dev/null
            echo "Build outputs:"
            ls -laR react-native-simple/android/app/build/outputs/ 2>/dev/null | head -50
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: react-native-clock2-apk-${{ github.run_number }}
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30

      - name: APK Size Verification
        run: |
          SIZE=$(du -h "${{ steps.find-apk.outputs.apk_path }}" | cut -f1)
          echo "✅ APK built successfully! Size: $SIZE"
