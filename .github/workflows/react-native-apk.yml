name: React Native APK Build

on:
  push:
    branches: [react-native-rewrite]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Delete stale package-lock.json
        working-directory: ./react-native-simple
        run: rm -f package-lock.json

      - name: Install npm dependencies
        working-directory: ./react-native-simple
        run: npm install

      - name: Build release APK
        id: gradle
        working-directory: ./react-native-simple/android
        env:
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: |
          echo "=== BUILDING APK ==="
          ./gradlew assembleRelease --no-daemon -x lint --info 2>&1 | tee /tmp/gradle.log
          GRADLE_EXIT=$?
          echo "=== GRADLE EXIT CODE: $GRADLE_EXIT ==="
          tail -50 /tmp/gradle.log
          echo "=== LOOKING FOR APK OUTPUT ==="
          # Check standard RN APK locations
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk/ dir"
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "No release/ dir"
          find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK in outputs"
          find /home/runner/work -name "*.apk" 2>/dev/null | tee /tmp/apk-find.log || echo "No APK in work dir"
          echo "=== APK SEARCH COMPLETE ==="
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "GRADLE FAILED"
            exit 1
          fi

      - name: Find APK file
        id: find-apk
        run: |
          echo "=== FIND APK ==="
          # Try to read APK path from Gradle log
          APK_FROM_LOG=$(grep -oP 'file:.*?\.apk' /tmp/gradle.log 2>/dev/null | head -1 || echo "")
          echo "APK from log: $APK_FROM_LOG"
          
          # Standard RN release APK location
          APK_PATH=""
          for dir in             "react-native-simple/android/app/build/outputs/apk/release"             "react-native-simple/android/app/build/outputs/apk"             "/home/runner/work/clock2/clock2/react-native-simple/android/app/build/outputs/apk/release"             "app/build/outputs/apk/release"; do
            if [ -d "$dir" ]; then
              echo "Checking: $dir"
              ls -la "$dir" 2>/dev/null
              APK=$(find "$dir" -name "*.apk" -type f 2>/dev/null | head -1)
              if [ -n "$APK" ]; then
                APK_PATH="$APK"
                break
              fi
            fi
          done
          
          # Fallback: any APK in entire project
          if [ -z "$APK_PATH" ]; then
            echo "Trying full project search..."
            APK_PATH=$(find react-native-simple -name "*.apk" -type f 2>/dev/null | head -1)
          fi
          
          echo "Final APK_PATH=$APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            echo "All files in app/build/outputs:"
            ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs"
            exit 1
          fi
          echo "Found APK: $APK_PATH ($(du -h $APK_PATH | cut -f1))"

      - name: Verify bundle is inside APK
        run: unzip -l "${{ steps.find-apk.outputs.apk_path }}" | grep -E "bundle|assets" | head -10

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-native-clock2-apk-${{ github.run_number }}
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30

      - name: APK Size Verification
        run: |
          SIZE=$(du -h "${{ steps.find-apk.outputs.apk_path }}" | cut -f1)
          echo "✅ APK built successfully! Size: $SIZE"
