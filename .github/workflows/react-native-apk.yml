name: React Native APK Build

on:
  push:
    branches: [react-native-rewrite]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Delete stale package-lock.json
        working-directory: ./react-native-simple
        run: rm -f package-lock.json

      - name: Install npm dependencies
        working-directory: ./react-native-simple
        run: npm install

      - name: Run postinstall patch script
        working-directory: ./react-native-simple
        run: node scripts/patch-babel.js

      - name: Create JS bundle for release
        working-directory: ./react-native-simple
        env:
          CI: true
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: |
          echo "=== CREATING JS BUNDLE ==="
          mkdir -p android/app/src/main/assets
          rm -f android/app/src/main/assets/index.android.bundle
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            2>&1
          echo "Bundle exit: $?"
          if [ -f android/app/src/main/assets/index.android.bundle ]; then
            echo "Bundle: $(du -h android/app/src/main/assets/index.android.bundle | cut -f1)"
          else
            echo "ERROR: Bundle not created!"
            exit 1
          fi

      - name: Build debug APK
        working-directory: ./react-native-simple/android
        env:
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: |
          echo "=== BUILDING DEBUG APK ==="
          # Build debug variant - no signing required
          ./gradlew app:assembleDebug --rerun-tasks --no-daemon -x lint --console=plain 2>&1 | tee /tmp/gradle.log
          GRADLE_EXIT=$?
          echo "=== GRADLE EXIT: $GRADLE_EXIT ==="
          echo "=== BUILD OUTPUTS ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null && echo "Debug APK dir found" || echo "No debug APK dir"
          ls -la app/build/outputs/ 2>/dev/null | head -10
          echo "=== ALL APK FILES ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== GRADLE LOG (last 80 lines) ==="
          tail -80 /tmp/gradle.log
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "BUILD FAILED with exit $GRADLE_EXIT"
            exit 1
          fi

      - name: Find APK file
        id: find-apk
        run: |
          echo "=== FIND APK ==="
          # Check for debug APK first
          APK=$(find react-native-simple -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "Found: $APK"
          else
            echo "No APK found in react-native-simple"
            # Search broader
            APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
            echo "Broad search: $APK"
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "APK_PATH=$APK"
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "ERROR: No APK found!"
            ls -laR react-native-simple/android/app/build/outputs/ 2>/dev/null | head -50
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-native-clock2-apk-${{ github.run_number }}
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30

      - name: APK Size Verification
        run: |
          SIZE=$(du -h "${{ steps.find-apk.outputs.apk_path }}" | cut -f1)
          echo "✅ APK built successfully! Size: $SIZE"
