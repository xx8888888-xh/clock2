name: React Native APK Build

on:
  push:
    branches: [react-native-rewrite]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Delete stale package-lock.json
        working-directory: ./react-native-simple
        run: rm -f package-lock.json

      - name: Install npm dependencies
        working-directory: ./react-native-simple
        run: npm install

      - name: Run postinstall patch script
        working-directory: ./react-native-simple
        run: node scripts/patch-babel.js

      - name: Build release APK
        id: gradle
        working-directory: ./react-native-simple/android
        env:
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: |
          echo "=== WORKING DIR ==="
          pwd
          echo "=== BUILDING APK ==="
          ./gradlew assembleRelease --no-daemon -x lint 2>&1 | tee /tmp/gradle.log
          GRADLE_EXIT=$?
          echo "=== GRADLE EXIT CODE: $GRADLE_EXIT ==="
          tail -30 /tmp/gradle.log
          echo "=== APK OUTPUT DIRECTORIES ==="
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          ls -laR app/build/outputs/apk/ 2>/dev/null | head -50 || echo "No apk dir"
          ls -laR app/build/outputs/apk/release/ 2>/dev/null | head -30 || echo "No release dir"
          echo "=== WORK DIR APK SEARCH ==="
          find /home/runner/work/clock2/clock2 -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Inspect build directory structure
        run: |
          echo "=== app/build/ directory ==="
          ls -la react-native-simple/android/app/build/ 2>/dev/null | head -20 || echo "No build dir"
          echo "=== app/build/outputs/ ==="
          ls -laR react-native-simple/android/app/build/outputs/ 2>/dev/null | head -50 || echo "No outputs"
          echo "=== All APK files ==="
          find react-native-simple -name "*.apk" -type f 2>/dev/null || echo "No APK"

      - name: Find APK file
        id: find-apk
        run: |
          echo "=== Find APK ==="
          APK_PATH=""
          for dir in \
            "react-native-simple/android/app/build/outputs/apk/release" \
            "react-native-simple/android/app/build/outputs/apk" \
            "react-native-simple/android/app/build/outputs" \
            "app/build/outputs/apk/release" \
            "app/build/outputs/apk"; do
            echo "Checking: $dir"
            APK=$(find "$dir" -name "*.apk" -type f 2>/dev/null | head -1)
            if [ -n "$APK" ]; then
              echo "Found: $APK"
              APK_PATH="$APK"
              break
            fi
          done
          
          echo "APK_PATH=$APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "ERROR: APK not found!"
            echo "Full project APK search:"
            find react-native-simple -name "*.apk" -type f 2>/dev/null
            exit 1
          fi
          echo "APK: $APK_PATH ($(du -h $APK_PATH | cut -f1))"

      - name: Verify bundle is inside APK
        run: unzip -l "${{ steps.find-apk.outputs.apk_path }}" | grep -E "bundle|assets" | head -10

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-native-clock2-apk-${{ github.run_number }}
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30

      - name: APK Size Verification
        run: |
          SIZE=$(du -h "${{ steps.find-apk.outputs.apk_path }}" | cut -f1)
          echo "✅ APK built successfully! Size: $SIZE"
