name: React Native APK Build

on:
  push:
    branches: [react-native-rewrite]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Delete stale package-lock.json
        working-directory: ./react-native-simple
        run: rm -f package-lock.json

      - name: Install npm dependencies
        working-directory: ./react-native-simple
        run: npm install

      - name: Build release APK
        working-directory: ./react-native-simple/android
        env:
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: |
          echo "=== BUILDING APK ==="
          ./gradlew assembleRelease --no-daemon -x lint 2>&1 | tee /tmp/gradle.log
          GRADLE_EXIT=$?
          echo "=== GRADLE EXIT CODE: $GRADLE_EXIT ==="
          tail -30 /tmp/gradle.log
          echo "=== ALL FILES IN OUTPUTS DIR ==="
          find app/build/outputs -type f 2>/dev/null || echo "No outputs dir"
          echo "=== ALL APK FILES IN PROJECT ==="
          find /home/runner/work/clock2/clock2 -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Inspect build directory
        run: |
          echo "=== Contents of android/app/build ==="
          ls -la react-native-simple/android/app/build/ 2>/dev/null || echo "No build dir"
          echo "=== Contents of android/app/build/outputs ==="
          ls -laR react-native-simple/android/app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          echo "=== Contents of android/app/build/intermediates ==="
          ls react-native-simple/android/app/build/intermediates/ 2>/dev/null | head -20 || echo "No intermediates"

      - name: Find APK file
        id: find-apk
        run: |
          echo "=== Searching for APK ==="
          find react-native-simple -name "*.apk" -type f 2>/dev/null
          APK_PATH=$(find react-native-simple -name "*.apk" -type f 2>/dev/null | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK_PATH=$APK_PATH"
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found"
            exit 1
          fi
          echo "Found: $APK_PATH ($(du -h $APK_PATH | cut -f1))"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-native-clock2-apk-${{ github.run_number }}
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30

      - name: APK Size Verification
        run: |
          SIZE=$(du -h "${{ steps.find-apk.outputs.apk_path }}" | cut -f1)
          echo "✅ APK built successfully! Size: $SIZE"
