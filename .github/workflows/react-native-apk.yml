name: React Native APK Build

on:
  push:
    branches: [react-native-rewrite]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Delete stale package-lock.json
        working-directory: ./react-native-simple
        run: rm -f package-lock.json

      - name: Install npm dependencies
        working-directory: ./react-native-simple
        run: npm install

      - name: Run postinstall patch script
        working-directory: ./react-native-simple
        run: node scripts/patch-babel.js

      - name: Create JS bundle manually
        working-directory: ./react-native-simple
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            2>&1 || echo "Bundle failed - continuing anyway"

      - name: Build release APK
        working-directory: ./react-native-simple/android
        env:
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: |
          echo "=== BUILD APK ==="
          pwd
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "No existing APK dir"
          echo "=== RUNNING GRADLE ==="
          ./gradlew app:assembleRelease --no-daemon -x lint 2>&1 | tee /tmp/gradle.log
          GRADLE_EXIT=$?
          echo "=== GRADLE EXIT: $GRADLE_EXIT ==="
          tail -20 /tmp/gradle.log
          echo "=== APK DIR AFTER BUILD ==="
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "No release APK dir"
          echo "=== ALL APK FILES ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== ALL APK IN PROJECT ==="
          find /home/runner/work/clock2/clock2 -name "*.apk" -type f 2>/dev/null

      - name: Find APK file
        id: find-apk
        run: |
          echo "=== Find APK ==="
          APK_PATH=$(find react-native-simple/android -name "*.apk" -path "*/release/*" -type f 2>/dev/null | head -1)
          echo "Release APK: $APK_PATH"
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find react-native-simple -name "*.apk" -type f 2>/dev/null | head -1)
            echo "Any APK: $APK_PATH"
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK_PATH=$APK_PATH"
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found"
            exit 1
          fi
          echo "APK found: $APK_PATH ($(du -h $APK_PATH | cut -f1))"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-native-clock2-apk-${{ github.run_number }}
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30

      - name: APK Size Verification
        run: |
          SIZE=$(du -h "${{ steps.find-apk.outputs.apk_path }}" | cut -f1)
          echo "✅ APK built successfully! Size: $SIZE"
