name: React Native APK Build

on:
  push:
    branches: [react-native-rewrite]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Delete stale package-lock.json
        run: rm -f react-native-simple/package-lock.json

      - name: Install npm dependencies
        run: npm install --prefix react-native-simple

      - name: Run postinstall patch script
        run: node --prefix react-native-simple scripts/patch-babel.js

      - name: Create JS bundle
        run: |
          echo "=== CREATING JS BUNDLE ==="
          mkdir -p react-native-simple/android/app/src/main/assets
          npx --prefix react-native-simple react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output react-native-simple/android/app/src/main/assets/index.android.bundle \
            --assets-dest react-native-simple/android/app/src/main/res \
            2>&1
          echo "Bundle exit: $?"
          ls -la react-native-simple/android/app/src/main/assets/
          if [ ! -f react-native-simple/android/app/src/main/assets/index.android.bundle ]; then
            echo "ERROR: Bundle not created!"
            exit 1
          fi

      - name: Build debug APK from repo root
        run: |
          echo "=== BUILDING APK FROM REPO ROOT ==="
          pwd
          ls -la react-native-simple/android/
          echo "=== CLEAN GRADLE BUILD ==="
          ./gradlew --project-dir react-native-simple/android clean --no-daemon 2>&1 | tail -5
          echo "=== BUILDING APK ==="
          ./gradlew --project-dir react-native-simple/android :app:assembleDebug \
            --rerun-tasks --no-daemon -x lint --console=plain 2>&1 | tee /tmp/gradle.log
          GRADLE_EXIT=$?
          echo "=== GRADLE EXIT: $GRADLE_EXIT ==="
          echo "=== WORKING DIR CONTENTS ==="
          ls -la
          echo "=== APK OUTPUTS ==="
          ls -laR react-native-simple/android/app/build/outputs/ 2>/dev/null | head -60
          echo "=== APK FILES ==="
          find react-native-simple -name "*.apk" -type f 2>/dev/null
          echo "=== LAST 50 GRADLE LOG ==="
          tail -50 /tmp/gradle.log
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "BUILD FAILED"
            exit 1
          fi

      - name: Find APK file
        id: find-apk
        run: |
          echo "=== FIND APK ==="
          APK=$(find react-native-simple -name "*.apk" -type f 2>/dev/null | head -1)
          echo "APK_PATH=$APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-native-clock2-apk-${{ github.run_number }}
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30

      - name: APK Size Verification
        run: |
          SIZE=$(du -h "${{ steps.find-apk.outputs.apk_path }}" | cut -f1)
          echo "✅ APK built successfully! Size: $SIZE"
