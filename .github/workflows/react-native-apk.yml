name: React Native APK Build

on:
  push:
    branches: [react-native-rewrite]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Delete stale package-lock.json (force fresh resolution with overrides)
        working-directory: ./react-native-simple
        run: rm -f package-lock.json

      - name: Install npm dependencies
        working-directory: ./react-native-simple
        run: npm install

      - name: Build release APK (Gradle bundles JS automatically)
        working-directory: ./react-native-simple/android
        env:
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: |
          ./gradlew assembleRelease --no-daemon -x lint --stacktrace 2>&1 | tee /tmp/gradle-output.log
          echo "--- GRADLE EXIT CODE: $? ---"
          tail -30 /tmp/gradle-output.log

      - name: Find APK file
        id: find-apk
        run: |
          echo "=== Searching for APK files ==="
          find react-native-simple/android -name "*.apk" -type f 2>/dev/null || true
          echo "=== Search complete ==="
          APK_PATH=$(find react-native-simple/android -name "*.apk" -path "*/release/*" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find react-native-simple/android -name "*.apk" -type f 2>/dev/null | head -1)
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          if [ -n "$APK_PATH" ] && [ -f "$APK_PATH" ]; then
            echo "APK size: $(du -h "$APK_PATH" | cut -f1)"
          fi

      - name: Verify bundle is inside APK
        if: steps.find-apk.outputs.apk_path != ''
        run: unzip -l "${{ steps.find-apk.outputs.apk_path }}" | grep -E "bundle|assets" | head -10

      - name: Upload APK artifact
        if: steps.find-apk.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: react-native-clock2-apk
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30

      - name: APK Size Verification
        if: steps.find-apk.outputs.apk_path != ''
        run: |
          SIZE=$(du -h "${{ steps.find-apk.outputs.apk_path }}" | cut -f1)
          echo "✅ APK built successfully! Size: $SIZE"
