name: React Native APK Build

on:
  push:
    branches: [react-native-rewrite]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Delete stale package-lock.json
        run: rm -f react-native-simple/package-lock.json

      - name: Install npm dependencies
        run: npm install --prefix react-native-simple

      - name: Run postinstall patch script
        run: node react-native-simple/scripts/patch-babel.js

      - name: Create JS bundle
        run: |
          echo "=== CREATING JS BUNDLE ==="
          mkdir -p react-native-simple/android/app/src/main/assets
          npx --prefix react-native-simple react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output react-native-simple/android/app/src/main/assets/index.android.bundle \
            --assets-dest react-native-simple/android/app/src/main/res \
            2>&1
          echo "Bundle exit: $?"
          ls -la react-native-simple/android/app/src/main/assets/
          if [ -f react-native-simple/android/app/src/main/assets/index.android.bundle ]; then
            echo "Bundle OK: $(wc -c < react-native-simple/android/app/src/main/assets/index.android.bundle) bytes"
          fi

      - name: Check Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null | head -3
          ls $ANDROID_HOME/platforms/ 2>/dev/null | head -3
          echo "=== GRADLE WRAPPER ==="
          ls -la react-native-simple/android/gradlew

      - name: Build debug APK
        run: |
          echo "=== BUILDING APK ==="
          ./gradlew --project-dir react-native-simple/android :app:assembleDebug \
            --rerun-tasks --no-daemon -x lint 2>&1 | tee /tmp/gradle.log
          GRADLE_EXIT=$?
          echo "=== GRADLE EXIT: $GRADLE_EXIT ==="
          echo "=== APK SEARCH ==="
          find react-native-simple -name "*.apk" -type f 2>/dev/null
          echo "=== APK OUTPUT DIR ==="
          ls -laR react-native-simple/android/app/build/outputs/ 2>/dev/null | head -30 || echo "No outputs"
          echo "=== GRADLE LOG LAST 40 ==="
          tail -40 /tmp/gradle.log
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "BUILD FAILED"
            exit 1
          fi

      - name: Find and upload APK
        id: find-apk
        run: |
          echo "=== FINDING APK ==="
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          echo "APK=$APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "ERROR: No APK found!"
            echo "Searching react-native-simple:"
            find react-native-simple -name "*.apk" -type f 2>/dev/null || echo "None"
            echo "Searching all:"
            find . -name "*.apk" -type f 2>/dev/null || echo "None"
            exit 1
          fi
          echo "Found: $APK ($(du -h $APK | cut -f1))"
          echo "apk_path_abs=$(realpath $APK)" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-native-clock2-apk-${{ github.run_number }}
          path: ${{ steps.find-apk.outputs.apk_path_abs }}
          retention-days: 30

      - name: APK Size Verification
        run: |
          SIZE=$(du -h "${{ steps.find-apk.outputs.apk_path_abs }}" | cut -f1)
          echo "✅ APK built successfully! Size: $SIZE"
