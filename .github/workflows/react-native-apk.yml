name: React Native APK Build

on:
  push:
    branches: [react-native-rewrite]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v -keystore react-native-simple/android/app/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US" 2>&1
          echo "Keystore generated: $(ls -la react-native-simple/android/app/debug.keystore)"

      - name: Delete stale package-lock.json
        working-directory: ./react-native-simple
        run: rm -f package-lock.json

      - name: Install npm dependencies
        working-directory: ./react-native-simple
        run: npm install

      - name: Run postinstall patch script
        working-directory: ./react-native-simple
        run: node scripts/patch-babel.js

      - name: Create JS bundle
        working-directory: ./react-native-simple
        env:
          CI: true
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: |
          echo "=== CREATING JS BUNDLE ==="
          mkdir -p android/app/src/main/assets
          node node_modules/react-native/cli.js bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            2>&1
          echo "Bundle exit: $?"
          ls -la android/app/src/main/assets/
          if [ -f android/app/src/main/assets/index.android.bundle ]; then
            echo "Bundle OK: $(wc -c < android/app/src/main/assets/index.android.bundle) bytes"
          fi

      - name: Build debug APK
        working-directory: ./react-native-simple/android
        env:
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: |
          echo "=== BUILDING APK ==="
          echo "PWD: $(pwd)"
          ls -la app/build/outputs/ 2>/dev/null | head -5 || echo "No existing outputs"
          ./gradlew :app:assembleDebug --rerun-tasks --no-daemon -x lint 2>&1 | tee /tmp/gradle.log
          GRADLE_EXIT=$?
          echo "=== GRADLE EXIT: $GRADLE_EXIT ==="
          echo "=== APK OUTPUT ==="
          ls -laR app/build/outputs/ 2>/dev/null | head -30 || echo "No outputs"
          echo "=== APK FILES ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== LAST 30 LOG ==="
          tail -30 /tmp/gradle.log
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "BUILD FAILED"
            exit 1
          fi

      - name: Find APK
        id: find-apk
        working-directory: ./react-native-simple/android
        run: |
          echo "=== FINDING APK ==="
          echo "PWD: $(pwd)"
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          echo "Found: $APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "ERROR: No APK found!"
            ls -laR app/build/outputs/ 2>/dev/null | head -30
            exit 1
          fi
          echo "APK size: $(du -h "$APK" | cut -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-native-clock2-apk-${{ github.run_number }}
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30

      - name: APK Size Verification
        run: |
          SIZE=$(du -h "${{ steps.find-apk.outputs.apk_path }}" | cut -f1)
          echo "✅ APK built successfully! Size: $SIZE"
