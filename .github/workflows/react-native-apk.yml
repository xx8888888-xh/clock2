name: React Native APK Build

on:
  push:
    branches: [react-native-rewrite]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Delete stale package-lock.json
        working-directory: ./react-native-simple
        run: rm -f package-lock.json

      - name: Install npm dependencies
        working-directory: ./react-native-simple
        run: npm install

      - name: Run postinstall patch script
        working-directory: ./react-native-simple
        run: node scripts/patch-babel.js

      - name: Create JS bundle
        working-directory: ./react-native-simple
        env:
          CI: true
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: |
          echo "=== CREATING JS BUNDLE ==="
          mkdir -p android/app/src/main/assets
          rm -f android/app/src/main/assets/index.android.bundle
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            2>&1
          echo "Bundle exit: $?"
          ls -la android/app/src/main/assets/
          if [ ! -f android/app/src/main/assets/index.android.bundle ]; then
            echo "ERROR: Bundle creation failed"
            exit 1
          fi

      - name: Create JS bundle explicitly for release
        working-directory: ./react-native-simple
        env:
          CI: true
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: |
          echo "=== CREATING JS BUNDLE FOR RELEASE ==="
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --minify false \
            2>&1
          ls -la android/app/src/main/assets/

      - name: Check RN build config
        working-directory: ./react-native-simple
        run: |
          echo "=== RN CONFIG ==="
          cat android/app/build.gradle | grep -A5 "react {"
          cat android/gradle.properties | grep -E "hermes|newArch"
          echo "=== BUNDLE EXISTS? ==="
          ls -la android/app/src/main/assets/index.android.bundle

      - name: Build release APK (force tasks)
        working-directory: ./react-native-simple/android
        env:
          REACT_NATIVE_DEV_SERVER_PORT: 0
        run: |
          echo "=== CLEANING ==="
          ./gradlew clean --no-daemon 2>&1 | tail -5
          echo "=== FORCING BUNDLE AND APK ==="
          ./gradlew app:createBundleDebugJsAndAssets app:createBundleReleaseJsAndAssets app:assembleRelease \
            --rerun-tasks --no-daemon -x lint --console=plain 2>&1 | tee /tmp/gradle.log
          GRADLE_EXIT=$?
          echo "=== GRADLE EXIT: $GRADLE_EXIT ==="
          echo "=== APK LOCATIONS ==="
          ls -laR app/build/outputs/apk/release/ 2>/dev/null | head -30
          find . -path "*/outputs/apk/*" -name "*.apk" 2>/dev/null
          echo "=== ALL APK ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== LAST 60 LOG LINES ==="
          tail -60 /tmp/gradle.log
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "BUILD FAILED with exit $GRADLE_EXIT"
            exit 1
          fi

      - name: Find APK file
        id: find-apk
        run: |
          echo "=== FIND APK ==="
          APK=$(find . -path "*/outputs/apk/release/*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          fi
          echo "APK_PATH=$APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "ERROR: No APK found!"
            find . -type f -name "*.apk" 2>/dev/null
            ls -laR app/build/outputs/ 2>/dev/null | head -50
            exit 1
          fi
          echo "APK: $APK ($(du -h $APK | cut -f1))"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-native-clock2-apk-${{ github.run_number }}
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30

      - name: APK Size Verification
        run: |
          SIZE=$(du -h "${{ steps.find-apk.outputs.apk_path }}" | cut -f1)
          echo "✅ APK built successfully! Size: $SIZE"
