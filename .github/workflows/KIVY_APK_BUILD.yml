name: Kivy APK Build

on:
  push:
    branches: [kivy-simple]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify project files
        run: |
          echo "=== Project Files ==="
          echo "main.py: $(wc -l < main.py 2>/dev/null || echo 0) lines"
          echo "buildozer.spec: $(wc -l < buildozer.spec 2>/dev/null || echo 0) lines"
          ls -la *.py *.spec *.png 2>/dev/null | head -20

      - name: Build APK with buildozer Docker
        run: |
          docker run --rm \
            -v "$(pwd):/home/user/clock2" \
            -w /home/user/clock2 \
            -e BUILDOZER_WARN_ON_ROOT=0 \
            buildozer/buildozer:latest \
            sh -c "
              pip install --upgrade pip wheel setuptools &&
              pip install cython==0.29.36 &&
              pip install kivy==2.3.0 &&
              pip install pillow &&
              buildozer android debug --verbose 2>&1 | tee buildozer.log
            "
        timeout-minutes: 50

      - name: Verify APK is real
        run: |
          echo "=== APK Verification ==="
          APK=$(find bin/ -name "*.apk" 2>/dev/null | head -1)
          
          if [ -z "$APK" ]; then
            echo "❌ No APK found in bin/"
            ls -la bin/ 2>/dev/null || echo "bin/ does not exist"
            cat buildozer.log 2>/dev/null | tail -50
            exit 1
          fi
          
          echo "✅ APK found: $APK"
          SIZE=$(stat -c%s "$APK")
          echo "   Size: $((SIZE/1024/1024)) MB"
          
          # Check ZIP header
          HEADER=$(head -c 4 "$APK" | xxd | head -1)
          echo "   Header: $HEADER"
          
          # Check for DEX (proof of real compilation)
          DEX=$(unzip -l "$APK" 2>/dev/null | grep -c "classes.dex" || echo 0)
          echo "   DEX files: $DEX"
          
          if [ "$DEX" -eq 0 ]; then
            echo "❌ No classes.dex — fake APK!"
            exit 1
          fi
          
          echo "✅ APK is REAL (has compiled DEX)"
          unzip -l "$APK" 2>/dev/null | grep "classes.dex\|lib/"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clock2-kivy-apk
          path: bin/*.apk
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clock2-build-log
          path: buildozer.log
          retention-days: 7
