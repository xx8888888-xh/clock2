name: Build Android APK

on:
  push:
    branches: [ architecture-rework ]
  workflow_dispatch:

jobs:
  build-android:
    name: 构建Android APK
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: 设置环境
      run: |
        echo "构建Android APK"
        
    - name: 安装buildozer
      run: |
        pip install buildozer
        
    - name: 检查配置
      run: |
        echo "main.py:"
        grep -n "Config.set\|Window.clearcolor\|Clock.schedule_once" main.py
        echo "透明度: Config.set('graphics', 'background_color', '0,0,0,0.5')"
        echo "窗口透明度: Window.clearcolor = (0, 0, 0, 0.01)"
        echo "延迟初始化: Clock.schedule_once(lambda dt: self.safe_init_window(), 1)"
        
    - name: 构建APK
      run: |
        buildozer android debug
        
    - name: 上传APK
      uses: actions/upload-artifact@v3
      with:
        name: petalarm-apk
        path: bin/*.apk
    
    - name: 生成构建报告
      run: |
        echo "Android APK构建完成"
        echo "架构: main.py"
        echo "透明度修复: Config.set('graphics', 'background_color', '0,0,0,0.5')"
        echo "窗口透明度: Window.clearcolor = (0, 0, 0, 0.01)"
        echo "延迟初始化: Clock.schedule_once(lambda dt: self.safe_init_window(), 1)"
        echo "Android Service: AndroidWindowService类"
        echo "Android权限: SYSTEM_ALERT_WINDOW权限"