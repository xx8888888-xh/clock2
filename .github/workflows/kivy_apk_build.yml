name: Kivy Android APK Build

on:
  push:
    branches: [ kivy-simple ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install Buildozer dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ccache \
          git \
          libffi-dev \
          libssl-dev \
          python3-dev \
          python3-pip \
          python3-setuptools \
          python3-venv \
          zip \
          unzip \
          libncurses5 \
          libncursesw5 \
          libgdbm-dev \
          libsqlite3-dev \
          libbz2-dev \
          libreadline-dev \
          zlib1g-dev \
          liblzma-dev \
          tk-dev \
          libgstreamer1.0-0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          openjdk-17-jdk \
          pkg-config \
          autoconf \
          automake \
          libtool
    
    - name: Install Buildozer and Kivy
      run: |
        pip3 install --upgrade pip setuptools wheel
        pip3 install buildozer
        pip3 install cython==0.29.33
        pip3 install kivy==2.3.0
        pip3 install kivymd
    
    - name: Initialize Buildozer (if needed)
      run: |
        if [ ! -f "buildozer.spec" ]; then
          buildozer init
        fi
        echo "Buildozer spec exists"
    
    - name: Build Android APK
      timeout-minutes: 60
      run: |
        echo "开始构建Android APK..."
        echo "当前目录: $(pwd)"
        echo "文件列表:"
        ls -la
        
        # 设置非交互模式
        export BUILDOZER_PROMPT_ACCEPT=1
        export BUILDOZER_NONINTERACTIVE=1
        
        # 清理之前的构建
        buildozer android clean 2>&1 || true
        
        # 开始构建
        echo "=== 开始APK构建 ==="
        buildozer -v android debug 2>&1 | tee build.log
        
        # 检查构建结果
        echo "=== 检查构建结果 ==="
        if find . -name "*.apk" -type f | grep -q "."; then
          APK_FILE=$(find . -name "*.apk" -type f | head -1)
          echo "✅ APK构建成功！"
          echo "APK文件: $APK_FILE"
          echo "文件大小: $(du -h "$APK_FILE" | cut -f1)"
          echo "文件详细信息:"
          ls -lh "$APK_FILE"
          
          # 移动APK到标准位置
          mkdir -p bin/
          cp "$APK_FILE" bin/ 2>/dev/null || true
        else
          echo "❌ APK构建失败 - 未找到APK文件"
          echo "构建日志最后100行:"
          tail -100 build.log
          exit 1
        fi
    
    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: kivy-clock2-apk
        path: |
          bin/*.apk
          *.apk
        retention-days: 30
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: kivy-build-logs
        path: build.log
        retention-days: 30
    
    - name: APK verification
      if: success()
      run: |
        echo "=== APK验证 ==="
        APK_FOUND=false
        
        # 检查bin目录
        if ls -la bin/*.apk 2>/dev/null; then
          APK_FILE=$(ls -la bin/*.apk | head -1 | awk '{print $9}')
          APK_FOUND=true
        # 检查根目录
        elif ls -la *.apk 2>/dev/null; then
          APK_FILE=$(ls -la *.apk | head -1 | awk '{print $9}')
          APK_FOUND=true
        fi
        
        if [ "$APK_FOUND" = true ]; then
          echo "✅ 验证通过: APK文件存在"
          echo "文件: $APK_FILE"
          SIZE=$(du -h "$APK_FILE" | cut -f1)
          echo "大小: $SIZE"
          
          # 检查文件大小是否合理
          SIZE_KB=$(du -k "$APK_FILE" | cut -f1)
          if [ "$SIZE_KB" -gt 5000 ]; then
            echo "✅ 大小验证通过: $SIZE_KB KB (>5MB)"
          else
            echo "⚠️ 大小警告: 只有 $SIZE_KB KB"
          fi
          
          echo "🎉 Kivy Android APK构建成功完成！"
        else
          echo "❌ 验证失败: 未找到APK文件"
          exit 1
        fi