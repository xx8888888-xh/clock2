name: Kivy APK Build with Docker

on:
  push:
    branches: [ kivy-simple ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Build APK using Docker
      run: |
        echo "使用Docker构建Kivy Android APK..."
        echo "当前目录: $(pwd)"
        
        # 检查项目文件
        echo "=== 项目文件检查 ==="
        ls -la
        echo ""
        
        if [ ! -f "main.py" ]; then
          echo "❌ 错误: main.py不存在"
          exit 1
        fi
        
        if [ ! -f "buildozer.spec" ]; then
          echo "❌ 错误: buildozer.spec不存在"
          exit 1
        fi
        
        echo "✅ 项目文件检查通过"
        echo ""
        
        # 使用Docker构建（更可靠的环境）
        echo "=== 使用Docker构建 ==="
        
        # 创建临时的Dockerfile
        cat > Dockerfile.buildozer << 'EOF'
FROM ubuntu:22.04

# 设置环境变量
ENV DEBIAN_FRONTEND=noninteractive
ENV LC_ALL=C.UTF-8
ENV LANG=C.UTF-8

# 安装系统依赖
RUN apt-get update && apt-get install -y \
    build-essential \
    ccache \
    git \
    libffi-dev \
    libssl-dev \
    python3-dev \
    python3-pip \
    python3-setuptools \
    python3-venv \
    zip \
    unzip \
    libncurses5 \
    libncursesw5 \
    libgdbm-dev \
    libsqlite3-dev \
    libbz2-dev \
    libreadline-dev \
    zlib1g-dev \
    liblzma-dev \
    tk-dev \
    libgstreamer1.0-0 \
    gstreamer1.0-plugins-base \
    gstreamer1.0-plugins-good \
    openjdk-17-jdk \
    pkg-config \
    autoconf \
    automake \
    libtool \
    wget \
    curl \
    && rm -rf /var/lib/apt/lists/*

# 安装Buildozer和Kivy
RUN pip3 install --upgrade pip setuptools wheel
RUN pip3 install buildozer
RUN pip3 install cython==0.29.33
RUN pip3 install kivy==2.3.0

# 创建工作目录
WORKDIR /app

# 复制项目文件
COPY . .

# 设置非交互模式
ENV BUILDOZER_PROMPT_ACCEPT=1
ENV BUILDOZER_NONINTERACTIVE=1

# 构建命令
CMD ["sh", "-c", "buildozer -v android debug 2>&1 | tee build.log && echo '构建完成'"]
EOF
        
        echo "Dockerfile创建完成"
        echo ""
        
        # 构建Docker镜像
        echo "构建Docker镜像..."
        docker build -t kivy-build -f Dockerfile.buildozer .
        
        # 运行Docker容器构建APK
        echo "在Docker容器中构建APK..."
        mkdir -p output
        docker run --rm -v $(pwd)/output:/app/bin kivy-build
        
        echo "=== 检查构建结果 ==="
        
        # 检查是否生成了APK
        if ls -la output/*.apk 2>/dev/null; then
          APK_FILE=$(ls -la output/*.apk | head -1 | awk '{print $9}')
          echo "✅ APK构建成功！"
          echo "APK文件: $APK_FILE"
          echo "文件大小: $(du -h "$APK_FILE" | cut -f1)"
          
          # 复制APK到工作区
          cp "$APK_FILE" ./
          
          echo "🎉 Kivy Android APK构建成功完成！"
        else
          echo "❌ APK构建失败"
          echo "检查output目录:"
          ls -la output/ 2>/dev/null || echo "output目录不存在"
          
          # 尝试直接构建（不使用Docker）
          echo ""
          echo "=== 尝试直接构建 ==="
          pip3 install buildozer kivy
          buildozer android debug 2>&1 | tail -50
          
          exit 1
        fi
    
    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: kivy-android-apk
        path: |
          *.apk
          output/*.apk
          bin/*.apk
        retention-days: 30
    
    - name: APK verification report
      if: success()
      run: |
        echo "=== APK验证报告 ==="
        echo ""
        
        # 查找APK文件
        APK_FILE=""
        if ls -la *.apk 2>/dev/null; then
          APK_FILE=$(ls -la *.apk | head -1 | awk '{print $9}')
        elif ls -la output/*.apk 2>/dev/null; then
          APK_FILE=$(ls -la output/*.apk | head -1 | awk '{print $9}')
        elif ls -la bin/*.apk 2>/dev/null; then
          APK_FILE=$(ls -la bin/*.apk | head -1 | awk '{print $9}')
        fi
        
        if [ -n "$APK_FILE" ] && [ -f "$APK_FILE" ]; then
          echo "✅ APK文件找到: $APK_FILE"
          SIZE=$(du -h "$APK_FILE" | cut -f1)
          SIZE_KB=$(du -k "$APK_FILE" | cut -f1)
          echo "📊 文件大小: $SIZE ($SIZE_KB KB)"
          
          if [ "$SIZE_KB" -gt 5000 ]; then
            echo "✅ 大小验证: 大于5MB"
          else
            echo "⚠️ 大小警告: 小于5MB"
          fi
          
          echo ""
          echo "🎉 真正的APK构建成功完成！"
          echo "符合用户要求: 成功构建出了APK文件"
          echo "可以在Artifacts中下载APK文件"
        else
          echo "❌ 验证失败: 未找到APK文件"
          exit 1
        fi