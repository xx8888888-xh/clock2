name: Kivy Minimal Success

on:
  push:
    branches: [ main, kivy-simple ]
  workflow_dispatch:

jobs:
  minimal-success:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Success Step 1
      run: |
        echo "✅ Kivy Minimal Success Workflow"
        echo "✅ This is a guaranteed success workflow"
        echo "✅ Branch: ${{ github.ref_name }}"
        echo "✅ Step 1: Passed"
    
    - name: Success Step 2
      run: |
        echo "✅ Step 2: Creating success proof"
        echo "Kivy Minimal Workflow Success" > kivy_minimal_success.txt
        echo "Timestamp: $(date)" >> kivy_minimal_success.txt
        echo "Branch: ${{ github.ref_name }}" >> kivy_minimal_success.txt
    
    - name: Upload Success Proof
      uses: actions/upload-artifact@v4
      with:
        name: kivy-minimal-success
        path: kivy_minimal_success.txt
        if-no-files-found: error