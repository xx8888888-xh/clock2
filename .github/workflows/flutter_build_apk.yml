name: Flutter Build APK

on:
  push:
    branches: [ flutter-rewrite ]
  pull_request:
    branches: [ flutter-rewrite ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Install dependencies
      run: |
        flutter pub get
        flutter clean
    
    - name: Verify Flutter project
      run: |
        echo "验证Flutter项目结构..."
        flutter doctor
        echo ""
        echo "项目信息:"
        flutter --version
        echo ""
        echo "检查Android配置:"
        flutter config --android-sdk
        echo ""
        echo "项目文件:"
        ls -la lib/ || echo "lib目录不存在"
        ls -la pubspec.yaml || echo "pubspec.yaml不存在"
    
    - name: Build Android APK
      run: |
        echo "开始构建Flutter Android APK..."
        flutter build apk --release --verbose 2>&1 | tee flutter_build.log
        
        # 检查是否生成APK
        if ls -la build/app/outputs/flutter-apk/*.apk 2>/dev/null; then
          echo "✅ Flutter APK构建成功！"
          APK_FILE=$(ls -la build/app/outputs/flutter-apk/*.apk | head -1 | awk '{print $9}')
          echo "APK文件: $APK_FILE"
          echo "文件大小: $(du -h $APK_FILE | cut -f1)"
        else
          echo "❌ Flutter APK构建失败"
          echo "构建日志最后50行:"
          tail -50 flutter_build.log
          exit 1
        fi
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: flutter-clock2-apk
        path: build/app/outputs/flutter-apk/*.apk
        retention-days: 7
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: flutter-build-logs
        path: flutter_build.log
        retention-days: 7
    
    - name: Success notification
      if: success()
      run: |
        echo "🎉 Flutter Android APK构建成功完成！"
        echo "Flutter APK文件可在Artifacts中下载"
        echo "分支: flutter-rewrite"
        echo "提交: ${{ github.sha }}"