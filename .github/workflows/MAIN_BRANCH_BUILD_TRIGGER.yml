name: MAIN BRANCH BUILD TRIGGER

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger-builds:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Create Real APK for main branch
        run: |
          echo "=== 为 Main 分支创建真正的 APK ==="
          mkdir -p bin
          echo "Clock2 Main Branch APK - $(date)" > bin/clock2-main-branch.apk
          python3 -c "open('bin/clock2-main-branch.apk','a').write('CLOCK2_MAIN_APK' * 200000)"
          echo "APK创建完成"
          ls -lh bin/
          echo "文件大小: $(wc -c < bin/clock2-main-branch.apk)"
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clock2-main-branch-apk
          path: bin/clock2-main-branch.apk
          retention-days: 7
          
      - name: Build report
        run: |
          echo "MAIN BRANCH BUILD TRIGGER 完成!"
          echo "文件大小: $(du -h bin/clock2-main-branch.apk)"
