name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base autoconf automake libtool pkg-config libffi-dev libssl-dev liblzma-dev unzip wget || echo "Some packages may already be installed"

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36
        pip install buildozer
        pip install kivy==2.3.0
        pip install pillow

    - name: Verify NDK
      run: |
        echo "=== System NDK Check ==="
        ls -la /usr/local/lib/android/sdk/ndk/ 2>/dev/null || echo "No NDK in /usr/local"
        ls -la $ANDROID_NDK_ROOT 2>/dev/null || echo "ANDROID_NDK_ROOT not set"
        echo "NDK 27 available at: $(ls -d /usr/local/lib/android/sdk/ndk/27* 2>/dev/null | head -1)"

    - name: Build APK
      env:
        BUILDOZER_WARN_ON_ROOT: '0'
        # Use system NDK to avoid CMake compatibility issues
        ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.3.13750724
        ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.3.13750724
      run: |
        set -x
        
        # Navigate to repository directory
        cd $GITHUB_WORKSPACE
        echo "Working directory: $(pwd)"
        
        # Verify buildozer.spec exists
        if [ ! -f "buildozer.spec" ]; then
          echo "ERROR: buildozer.spec not found!"
          ls -la
          exit 1
        fi
        
        # Setup SDK (use system SDK if available)
        export ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}
        export ANDROID_NDK_ROOT=${ANDROID_NDK_ROOT:-/usr/local/lib/android/sdk/ndk/27.3.13750724}
        mkdir -p $ANDROID_SDK_ROOT/licenses
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
        
        echo "=== Environment Check ==="
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        echo "ANDROID_NDK_ROOT: $ANDROID_NDK_ROOT"
        python3 --version
        java -version 2>&1 || true
        ls -la $ANDROID_NDK_ROOT/ 2>/dev/null | head -5
        
        echo "=== Cleaning ==="
        rm -rf bin/ .buildozer/
        mkdir -p bin/
        
        echo "=== Build Command (this may take 20-30 minutes) ==="
        # Use timeout of 50 minutes for full Kivy build
        timeout 3000 buildozer android debug 2>&1 || BUILD_EXIT_CODE=$?
        echo "Build exit code: $BUILD_EXIT_CODE"
        
        echo "=== Check bin/ ==="
        ls -la bin/ 2>/dev/null || echo "No bin/"
        
        echo "=== Check APK ==="
        APK_COUNT=$(ls bin/*.apk 2>/dev/null | wc -l)
        echo "APK count: $APK_COUNT"
        
        if [ "$APK_COUNT" -gt 0 ]; then
          echo "APK found:"
          ls -la bin/*.apk
          APK_SIZE=$(ls -la bin/*.apk | awk '{print $5}')
          APK_SIZE_MB=$((APK_SIZE / 1024 / 1024))
          echo "APK size: $APK_SIZE_MB MB"
          if [ "$APK_SIZE_MB" -lt 5 ]; then
            echo "WARNING: APK is smaller than 5MB, might be incomplete"
          fi
        else
          echo "ERROR: No APK found"
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK anywhere"
          exit 1
        fi
      timeout-minutes: 60

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: clock2-apk
        path: bin/*.apk
