name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache system dependencies
      id: cache-deps
      uses: actions/cache@v3
      with:
        path: |
          /var/cache/apt
          /var/lib/apt
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/build-apk.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-

    - name: Update apt cache
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update

    - name: Install system dependencies
      run: |
        sudo apt-get install -y python3-pip build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base autoconf automake libtool pkg-config libffi-dev libssl-dev liblzma-dev openjdk-17-jdk || echo "Dependencies may already be installed"

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36
        pip install buildozer
        pip install kivy==2.3.0
        pip install pillow plyer

    - name: Setup Android SDK licenses
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "24333f8a63b6825ea9c5514f83c2829b004d1fee\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

    - name: Build APK
      env:
        BUILDOZER_WARN_ON_ROOT: '0'
      run: |
        set -x
        echo "=== STEP 1: Environment Check ==="
        pwd
        ls -la
        python3 --version
        java -version 2>&1 || true
        which buildozer
        buildozer --version || true
        
        echo "=== STEP 2: Clean ==="
        rm -rf bin/ .buildozer/
        mkdir -p bin/
        
        echo "=== STEP 3: Build ==="
        buildozer android debug || true
        
        echo "=== STEP 4: Check Results ==="
        find . -name "*.apk" -type f 2>/dev/null
        ls -la bin/ 2>/dev/null || echo "No bin/"
        ls -la .buildozer/ 2>/dev/null || echo "No .buildozer/"
        
        echo "=== STEP 5: Final APK Check ==="
        if ls bin/*.apk 1>/dev/null 2>&1; then
          echo "APK found:"
          ls -la bin/*.apk
        else
          echo "No APK found in bin/"
          exit 1
        fi
      timeout-minutes: 60

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: clock2-apk
        path: bin/*.apk
