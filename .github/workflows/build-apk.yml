name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip build-essential git ffmpeg \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
          zlib1g-dev libgstreamer1.0-0 \
          autoconf automake libtool pkg-config libffi-dev libssl-dev liblzma-dev \
          unzip wget || true

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36
        pip install buildozer
        pip install kivy==2.3.0
        pip install pillow

    - name: Setup Android SDK
      run: |
        echo "=== Setup Android SDK ==="
        
        export ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}
        mkdir -p $ANDROID_SDK_ROOT
        
        # Create ALL license files
        mkdir -p $ANDROID_SDK_ROOT/licenses
        
        # Android SDK License
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n84831b9409646a918e30573bab4c9c91346d8abd\nd56f5187479451eabf01fb78af6dfcb131a6481e\ne6b7c2ab7fa2298c15165e9583d0acf0b04a2232" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
        
        # Android SDK Preview License
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
        
        # Google Play Services License
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/google-play-services-license
        
        # Android SDK ARM DBT License
        echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-arm-dbt-license
        
        # Google GDK License  
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/google-gdk-license
        
        # Android Googletv License
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-googletv-license
        
        # Android Googlexr License
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-googlexr-license
        
        # Intel High DIMage
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/intel-android-extra-license
        
        # MCU License
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/mips-android-sysimage-license
        
        echo "=== License files created ==="
        ls -la $ANDROID_SDK_ROOT/licenses/
        
        # Check if cmdline-tools exists
        if [ ! -d "$ANDROID_SDK_ROOT/cmdline-tools" ]; then
          echo "Installing cmdline-tools..."
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
        fi
        
        # Accept all licenses using echo y
        echo -e "y\ny\ny\ny\ny\ny\ny\ny\ny" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT 2>/dev/null || true
        
        # Install required SDK components
        echo "=== Installing SDK components ==="
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;33.0.0" \
          "build-tools;34.0.0" || true
        
        echo "=== SDK verification ==="
        ls -la $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null || echo "No build-tools"

    - name: Build APK
      env:
        BUILDOZER_WARN_ON_ROOT: '0'
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.3.13750724
        ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.3.13750724
      run: |
        set -x
        
        cd $GITHUB_WORKSPACE
        echo "Working directory: $(pwd)"
        ls -la
        
        if [ ! -f "buildozer.spec" ]; then
          echo "ERROR: buildozer.spec not found!"
          exit 1
        fi
        
        echo "=== Environment ==="
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        python3 --version
        
        echo "=== Verify SDK ==="
        ls -la $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null
        
        echo "=== Cleaning ==="
        rm -rf bin/ .buildozer/
        mkdir -p bin/
        
        echo "=== Build (20-30 min) ==="
        timeout 3000 buildozer android debug 2>&1 || BUILD_EXIT_CODE=$?
        echo "Build exit code: $BUILD_EXIT_CODE"
        
        echo "=== Check results ==="
        if [ -f "bin/"*.apk 2>/dev/null ]; then
          echo "APK found:"
          ls -la bin/*.apk
          APK_SIZE=$(stat -c%s bin/*.apk 2>/dev/null || echo 0)
          APK_SIZE_MB=$((APK_SIZE / 1024 / 1024))
          echo "APK size: $APK_SIZE_MB MB"
        else
          echo "ERROR: No APK found"
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK"
          exit 1
        fi
      timeout-minutes: 60

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: clock2-apk
        path: bin/*.apk
