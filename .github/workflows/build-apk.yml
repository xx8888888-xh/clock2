name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache system dependencies
      id: cache-deps
      uses: actions/cache@v3
      with:
        path: |
          /var/cache/apt
          /var/lib/apt
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/build-apk.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-

    - name: Update apt cache
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update

    - name: Install system dependencies
      run: |
        sudo apt-get install -y python3-pip build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base autoconf automake libtool pkg-config libffi-dev libssl-dev liblzma-dev openjdk-17-jdk || echo "Dependencies may already be installed"

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36
        pip install buildozer
        pip install kivy==2.3.0
        pip install pillow plyer

    - name: Setup Android SDK licenses
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "24333f8a63b6825ea9c5514f83c2829b004d1fee\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

    - name: Check build environment
      run: |
        echo "=== Build Environment ==="
        echo "Python version:"
        python3 --version
        echo "Java version:"
        java -version 2>&1
        echo "Buildozer installed:"
        pip show buildozer
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        echo "ANDROID_HOME: $ANDROID_HOME"

    - name: Build APK
      env:
        BUILDOZER_WARN_ON_ROOT: '0'
        BUILDOZER_VERBOSE: '1'
      run: |
        echo "=== Starting Build ==="
        ls -la
        echo "=== Project files ==="
        ls -la *.py *.spec 2>/dev/null || true
        echo "=== Buildozer version ==="
        buildozer version || true
        echo "=== Build APK ==="
        buildozer android debug 2>&1 | tee build.log
        echo "=== Build result ==="
        tail -100 build.log
      timeout-minutes: 60

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: clock2-apk
        path: bin/*.apk

    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log
