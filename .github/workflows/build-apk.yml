name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache system dependencies
      id: cache-deps
      uses: actions/cache@v3
      with:
        path: |
          /var/cache/apt
          /var/lib/apt
        key: ${{ runner.os }}-apt-v2-${{ hashFiles('.github/workflows/build-apk.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-

    - name: Update apt cache
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update

    - name: Install system dependencies
      run: |
        sudo apt-get install -y python3-pip build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base autoconf automake libtool pkg-config libffi-dev libssl-dev liblzma-dev openjdk-17-jdk unzip wget || echo "Some packages may already be installed"

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36
        pip install buildozer
        pip install kivy==2.3.0
        pip install pillow plyer

    - name: Setup Android SDK
      run: |
        mkdir -p ~/.buildozer/android/platform/
        cd ~/.buildozer/android/platform/
        
        # Download Android command line tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mkdir -p android-sdk/cmdline-tools
        mv cmdline-tools android-sdk/cmdline-tools/latest
        
        # Set environment
        export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
        mkdir -p $ANDROID_SDK_ROOT
        cd $ANDROID_SDK_ROOT
        
        # Accept licenses
        mkdir -p $ANDROID_SDK_ROOT/licenses
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
        
        # Install required SDK components
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;33.0.0" || true
        
        # IMPORTANT: Create symlink for buildozer compatibility
        # buildozer looks for sdkmanager at android-sdk/tools/bin/sdkmanager
        mkdir -p $ANDROID_SDK_ROOT/tools/bin
        ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK_ROOT/tools/bin/sdkmanager
        ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager.bat $ANDROID_SDK_ROOT/tools/bin/sdkmanager.bat 2>/dev/null || true
        
        # Verify symlink
        echo "=== SDK Verification ==="
        ls -la $ANDROID_SDK_ROOT/
        ls -la $ANDROID_SDK_ROOT/tools/bin/ 2>/dev/null || echo "No tools/bin"
        ls -la $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/ 2>/dev/null || echo "No cmdline-tools"

    - name: Build APK
      env:
        BUILDOZER_WARN_ON_ROOT: '0'
      run: |
        set -x
        
        # Navigate to repository directory (where buildozer.spec is located)
        cd $GITHUB_WORKSPACE
        echo "Working directory: $(pwd)"
        
        # Verify buildozer.spec exists
        if [ ! -f "buildozer.spec" ]; then
          echo "ERROR: buildozer.spec not found!"
          ls -la
          exit 1
        fi
        
        # Setup SDK symlinks (in case Build APK runs in a different shell)
        export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
        mkdir -p $ANDROID_SDK_ROOT/tools/bin
        if [ ! -L "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" ]; then
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK_ROOT/tools/bin/sdkmanager
        fi
        
        # Set PATH for buildozer
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
        
        echo "=== Environment Check ==="
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
        echo "Current directory: $(pwd)"
        python3 --version
        java -version 2>&1 || true
        
        echo "=== Checking SDK ==="
        ls -la $ANDROID_SDK_ROOT/ 2>/dev/null || echo "SDK not found"
        ls -la $ANDROID_SDK_ROOT/tools/bin/ 2>/dev/null || echo "No tools/bin"
        test -f $ANDROID_SDK_ROOT/tools/bin/sdkmanager && echo "sdkmanager exists at tools/bin" || echo "sdkmanager MISSING at tools/bin"
        test -f $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager && echo "sdkmanager exists at cmdline-tools" || echo "sdkmanager MISSING at cmdline-tools"
        
        echo "=== Cleaning ==="
        rm -rf bin/ .buildozer/
        mkdir -p bin/
        
        echo "=== Build Command (this may take 20-30 minutes) ==="
        # Increased timeout for full Kivy build
        timeout 3000 buildozer android debug 2>&1 || BUILD_EXIT_CODE=$?
        echo "Build exit code: $BUILD_EXIT_CODE"
        
        echo "=== Check bin/ ==="
        ls -la bin/ 2>/dev/null || echo "No bin/"
        
        echo "=== Check APK ==="
        APK_COUNT=$(ls bin/*.apk 2>/dev/null | wc -l)
        echo "APK count: $APK_COUNT"
        
        if [ "$APK_COUNT" -gt 0 ]; then
          echo "APK found:"
          ls -la bin/*.apk
        else
          echo "ERROR: No APK found"
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK anywhere"
          exit 1
        fi
      timeout-minutes: 60

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: clock2-apk
        path: bin/*.apk
