name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip build-essential git ffmpeg \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
          zlib1g-dev libgstreamer1.0-0 \
          autoconf automake libtool pkg-config libffi-dev libssl-dev liblzma-dev \
          unzip wget || true

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK and NDK
      uses: android-actions/setup-android@v2
      with:
        sdk-components: "platforms;android-34 build-tools;34.0.0"

    - name: Install specific NDK
      run: |
        # Install NDK r25b (more compatible with cmake 3.31)
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        mkdir -p $ANDROID_SDK_ROOT
        
        cd /tmp
        wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O ndk.zip
        unzip -q ndk.zip
        mv android-ndk-r25b $ANDROID_SDK_ROOT/ndk-r25b
        rm ndk.zip
        
        echo "NDK installed at: $ANDROID_SDK_ROOT/ndk-r25b"
        ls -la $ANDROID_SDK_ROOT/ndk-r25b/

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36
        pip install buildozer
        pip install kivy==2.3.0
        pip install pillow

    - name: Setup Android SDK paths
      run: |
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        export ANDROID_NDK_ROOT=$HOME/android-sdk/ndk-r25b
        export ANDROID_NDK_HOME=$HOME/android-sdk/ndk-r25b
        
        mkdir -p $ANDROID_SDK_ROOT/licenses
        for lic in android-sdk-license android-sdk-preview-license; do
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/$lic
        done
        
        # Create tools/bin symlinks for buildozer
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest/bin
        if [ ! -f "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
          unzip -q cmdline.zip
          mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
        fi
        
        mkdir -p $ANDROID_SDK_ROOT/tools/bin
        ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK_ROOT/tools/bin/sdkmanager 2>/dev/null || true
        
        echo "=== SDK Status ==="
        ls -la $ANDROID_SDK_ROOT/

    - name: Build APK
      env:
        BUILDOZER_WARN_ON_ROOT: '0'
        ANDROID_SDK_ROOT: /home/runner/android-sdk
        ANDROID_NDK_ROOT: /home/runner/android-sdk/ndk-r25b
        ANDROID_NDK_HOME: /home/runner/android-sdk/ndk-r25b
      run: |
        set -x
        
        cd $GITHUB_WORKSPACE
        echo "Working directory: $(pwd)"
        ls -la
        
        if [ ! -f "buildozer.spec" ]; then
          echo "ERROR: buildozer.spec not found!"
          exit 1
        fi
        
        # Clean
        rm -rf bin/ .buildozer/
        mkdir -p bin/
        
        echo "=== Build (20-30 min) ==="
        timeout 3000 buildozer android debug 2>&1 || BUILD_EXIT_CODE=$?
        echo "Build exit code: $BUILD_EXIT_CODE"
        
        echo "=== Check results ==="
        if [ -f "bin/"*.apk 2>/dev/null ]; then
          echo "APK found:"
          ls -la bin/*.apk
          APK_SIZE=$(stat -c%s bin/*.apk 2>/dev/null || echo 0)
          APK_SIZE_MB=$((APK_SIZE / 1024 / 1024))
          echo "APK size: $APK_SIZE_MB MB"
        else
          echo "ERROR: No APK found"
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK"
          exit 1
        fi
      timeout-minutes: 60

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: clock2-apk
        path: bin/*.apk
