name: Kivy APK Build

on:
  push:
    branches: [kivy-simple]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3-pip build-essential ccache git zip unzip \
            openjdk-17-jdk python3-dev ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libncurses5-dev libreadline-dev libsqlite3-dev \
            liblzma-dev libssl-dev wget

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Download and set up Android SDK
        run: |
          ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH" >> $GITHUB_ENV

          # Download commandlinetools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools/
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm /tmp/cmdline-tools.zip

          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          # Accept all licenses
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_SDK_ROOT/licenses/android-sdk-arm-dbt-license
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-googletv-license
          echo -e "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > $ANDROID_SDK_ROOT/licenses/google-gdk-license
          echo -e "\n601085b94cd77f0b54ff86406957099ebe79c4d6" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license

          # Install required SDK components
          echo "=== Installing Android SDK components ==="
          $SDKMANAGER --sdk_root=$ANDROID_SDK_ROOT \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25b" \
            "platform-tools" \
            2>&1 | tail -10

          echo "=== SDK installed ==="
          ls $ANDROID_SDK_ROOT/

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties

      - name: Pre-create buildozer SDK license files (needed before buildozer bootstrap)
        run: |
          # Buildozer installs its own SDK at ~/.buildozer/android/platform/android-sdk/
          # We pre-create license files so buildozer's sdkmanager doesn't prompt for license acceptance
          BUILDOZER_SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $BUILDOZER_SDK/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $BUILDOZER_SDK/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> $BUILDOZER_SDK/licenses/android-sdk-license
          echo -e "\nd975f751698a77b0b54ff86406957099ebe79c4d6" >> $BUILDOZER_SDK/licenses/android-sdk-license
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $BUILDOZER_SDK/licenses/android-googletv-license
          echo -e "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > $BUILDOZER_SDK/licenses/google-gdk-license
          echo -e "601085b94cd77f0b54ff86406957099ebe79c4d6" > $BUILDOZER_SDK/licenses/android-sdk-preview-license
          echo "✅ License files created in $BUILDOZER_SDK/licenses/"
          ls $BUILDOZER_SDK/licenses/

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip wheel setuptools
          pip install cython==0.29.36
          pip install kivy==2.3.0
          pip install pillow
          pip install buildozer

      - name: Show buildozer version
        run: |
          buildozer version
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

      - name: Build APK with buildozer
        run: |
          echo "=== Starting APK build at $(date) ==="
          set -o pipefail
          buildozer android debug 2>&1 | tee buildozer.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== Build exit code: $EXIT_CODE ==="
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Build failed with exit code $EXIT_CODE"
            tail -50 buildozer.log
            exit 1
          fi
        timeout-minutes: 50

      - name: Verify APK
        run: |
          echo "=== APK Verification ==="
          APK=$(find bin/ -name "*.apk" 2>/dev/null | head -1)
          
          if [ -z "$APK" ]; then
            echo "❌ No APK found"
            cat buildozer.log | tail -100
            exit 1
          fi
          
          SIZE=$(stat -c%s "$APK")
          echo "✅ APK: $APK"
          echo "   Size: $((SIZE/1024/1024)) MB"
          
          DEX_COUNT=$(unzip -l "$APK" 2>/dev/null | grep -c "classes.dex" || echo 0)
          echo "   DEX files: $DEX_COUNT"
          
          if [ "$DEX_COUNT" -eq 0 ]; then
            echo "❌ No classes.dex - FAKE APK!"
            exit 1
          fi
          echo "✅ APK is REAL"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clock2-kivy-apk
          path: bin/*.apk
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clock2-build-log
          path: buildozer.log
          retention-days: 7
