name: Kivy APK Build

on:
  push:
    branches: [kivy-simple]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3-pip build-essential ccache git zip unzip \
            openjdk-17-jdk python3-dev ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libncurses5-dev libreadline-dev libsqlite3-dev \
            liblzma-dev libssl-dev wget autoconf automake libtool \
            pkg-config libncurses-dev libffi-dev zlib1g-dev

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Download and set up Android SDK cmdline-tools
        run: |
          BUILDOZER_SDK=$HOME/.buildozer/android/platform/android-sdk

          # Download cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip

          # Clean up any previous partial install
          rm -rf $BUILDOZER_SDK/cmdline-tools

          # Extract to temp dir
          unzip -q /tmp/cmdline-tools.zip -d /tmp/
          # Zip structure: cmdline-tools/bin/sdkmanager (no "latest" subfolder in zip)
          # Create the standard "latest" layout: cmdline-tools/latest/bin/sdkmanager
          mkdir -p $BUILDOZER_SDK/cmdline-tools
          mv /tmp/cmdline-tools $BUILDOZER_SDK/cmdline-tools/latest
          rm -f /tmp/cmdline-tools.zip

          echo "=== Verifying sdkmanager ==="
          SDKMANAGER="$BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager"
          ls $SDKMANAGER && echo "✅ sdkmanager found at $SDKMANAGER" || echo "❌ NOT found"

          # Create legacy "tools" symlink for old buildozer versions that look for:
          #   ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          if [ ! -e "$BUILDOZER_SDK/tools" ]; then
            ln -s $BUILDOZER_SDK/cmdline-tools/latest $BUILDOZER_SDK/tools
          fi

          echo "=== SDK structure ==="
          ls $BUILDOZER_SDK/

      - name: Accept SDK licenses and install SDK components
        run: |
          BUILDOZER_SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $BUILDOZER_SDK/licenses

          # Write all required license files
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $BUILDOZER_SDK/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> $BUILDOZER_SDK/licenses/android-sdk-license
          echo -e "\nd975f751698a77b0b54ff86406957099ebe79c4d6" >> $BUILDOZER_SDK/licenses/android-sdk-license
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $BUILDOZER_SDK/licenses/android-googletv-license
          echo -e "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > $BUILDOZER_SDK/licenses/google-gdk-license
          echo -e "601085b94cd77f0b54ff86406957099ebe79c4d6" > $BUILDOZER_SDK/licenses/android-sdk-preview-license
          echo "601085b94cd77f0b54ff86406957099ebe79c4d6" > $BUILDOZER_SDK/licenses/android-sdk-arm-dbt-license

          SDKMANAGER="$BUILDOZER_SDK/cmdline-tools/latest/bin/sdkmanager"

          # Note: ndk;25b is NOT available in sdkmanager (package not found)
          # Buildozer will download NDK r25b from Google's servers during bootstrap
          # We patch flags.cmake in the build step to fix CMake IN_LIST compatibility
          echo "=== Installing SDK components via sdkmanager ==="
          # Use set +e so sdkmanager failures don't abort the step
          # (buildozer will handle any missing SDK components itself)
          set +e
          $SDKMANAGER --sdk_root=$BUILDOZER_SDK \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            2>&1
          SDK_EXIT=$?
          set -e
          echo "sdkmanager exit code: $SDK_EXIT"
          if [ $SDK_EXIT -ne 0 ]; then
            echo "⚠️ sdkmanager returned non-zero but continuing - buildozer will bootstrap SDK"
          fi

          echo "=== SDK contents ==="
          ls $BUILDOZER_SDK/

      - name: Set buildozer environment variables
        run: |
          BUILDOZER_SDK=$HOME/.buildozer/android/platform/android-sdk
          echo "ANDROID_HOME=$BUILDOZER_SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$BUILDOZER_SDK" >> $GITHUB_ENV
          echo "BUILDOZER_SDK_ROOT=$BUILDOZER_SDK" >> $GITHUB_ENV
          echo "✅ Environment variables set:"
          echo "   ANDROID_HOME=$BUILDOZER_SDK"
          echo "   ANDROID_SDK_ROOT=$BUILDOZER_SDK"
          echo "   BUILDOZER_SDK_ROOT=$BUILDOZER_SDK"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip wheel setuptools
          pip install cython==0.29.36
          pip install kivy==2.3.0
          pip install pillow
          pip install buildozer

      - name: Show buildozer version
        run: |
          buildozer version
          echo "ANDROID_HOME=${{ env.ANDROID_HOME }}"
          echo "ANDROID_SDK_ROOT=${{ env.ANDROID_SDK_ROOT }}"

      - name: Build APK with buildozer
        env:
          BUILDOZER_WARN_ON_ROOT: '0'
        run: |
          # Clean old builds to avoid stale cache issues
          rm -rf bin/ .buildozer/
          mkdir -p bin/

          echo "=== Starting APK build at $(date) ==="

          # Patch NDK flags.cmake if it exists (NDK is downloaded by buildozer bootstrap)
          NDK_FLAGS="$HOME/.buildozer/android/platform/android-ndk-r25b/build/cmake/flags.cmake"
          if [ -f "$NDK_FLAGS" ]; then
            echo "Patching NDK flags.cmake to fix IN_LIST CMake compatibility issue..."
            sed -i 's/if( arg IN_LIST ANDROID_SANITIZE )/# PATCHED: IN_LIST issue/' "$NDK_FLAGS"
            echo "✅ NDK flags.cmake patched"
          else
            echo "⚠️ NDK flags.cmake not found yet (buildozer may still be downloading NDK)"
          fi

          set -o pipefail
          buildozer android debug 2>&1 | tee buildozer.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== Build exit code: $EXIT_CODE ==="
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Build failed with exit code $EXIT_CODE"
            tail -100 buildozer.log
            exit 1
          fi
        timeout-minutes: 90

      - name: Verify APK
        run: |
          echo "=== APK Verification ==="
          APK=$(find bin/ -name "*.apk" 2>/dev/null | head -1)

          if [ -z "$APK" ]; then
            echo "❌ No APK found"
            cat buildozer.log | tail -100
            exit 1
          fi

          SIZE=$(stat -c%s "$APK")
          echo "✅ APK: $APK"
          echo "   Size: $((SIZE/1024/1024)) MB"

          DEX_COUNT=$(unzip -l "$APK" 2>/dev/null | grep -c "classes.dex" || echo 0)
          echo "   DEX files: $DEX_COUNT"

          if [ "$DEX_COUNT" -eq 0 ]; then
            echo "❌ No classes.dex - FAKE APK!"
            exit 1
          fi
          echo "✅ APK is REAL"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clock2-kivy-apk
          path: bin/*.apk
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clock2-build-log
          path: buildozer.log
          retention-days: 7
