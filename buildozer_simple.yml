[app]
title = 宠物闹钟 - 简化版
package.name = petalarm_simple
package.domain = org.petalarm
source.dir = .
source.include_exts = py,png
source.main = simple_main.py
version = 1.0.0
requirements = python3,kivy==2.3.0
icon.filename = icon.png
orientation = portrait
fullscreen = 0
hide_status_bar = -1
hide_navigation_bar = -1
show_title_bar = 0
log_level = 2
android.permissions = INTERNET
android.api = 33
android.minapi = 21
android.target_api = 33
android.sdk = 34
android.ndk = 25b
android.ndk_api = 21
android.archs = armeabi-v7a, arm64-v8a
android.release_optimize = 1
android.manifest_placeholders = [foregroundServiceType: "dataSync"]
source.exclude_exts = spec
source.exclude_dirs = tests, bin, venv, __pycache__, .git, .idea
build.dir = ./.buildozer
bin.dir = ./bin
name = 宠物闹钟 - 简化版

[buildozer]
log_level = 2
warn_on_root = 1
build_dir = ./.buildozer
bin_dir = ./bin