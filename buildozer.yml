[app]
title = Clock2
package.name = clock2
package.domain = org.example
source.dir = .
source.include_exts = py
source.main = main.py
version = 1.0.0
requirements = python3,kivy==2.3.0
orientation = portrait
fullscreen = 0
hide_status_bar = -1
hide_navigation_bar = -1
show_title_bar = 0
log_level = 2
android.permissions = INTERNET, WRITE_EXTERNAL_STORAGE, READ_EXTERNAL_STORAGE
android.api = 33
android.minapi = 21
android.target_api = 33
android.sdk = 34
android.ndk = 25b
android.ndk_api = 21
android.archs = arm64-v8a, armeabi-v7a
android.release_optimize = 1
android.manifest_placeholders = []
source.exclude_exts = spec
source.exclude_dirs = tests, bin, venv, __pycache__, .git, .idea, .buildozer
build.dir = ./.buildozer
bin.dir = ./bin
name = Clock2